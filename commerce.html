<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGH | 임광호 포트폴리오</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏬</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #FAFAF8;
      --bg-2: #FFFFFF;
      --bg-3: #F4F1ED;
      --ink: #1C1814;
      --ink-2: #6B6258;
      --ink-3: #A8A09A;
      --border: #E6E0D8;
      --border-2: #D4CCC4;
      --accent: #C75B3A;
      --accent-bg: rgba(199,91,58,0.08);
      --ok: #2D8A4E;
      --warn: #B06000;
      --danger: #C0392B;
      --radius: 8px;
      --shadow-sm: 0 1px 3px rgba(28,24,20,0.06), 0 1px 2px rgba(28,24,20,0.04);
      --shadow-md: 0 4px 16px rgba(28,24,20,0.08), 0 1px 4px rgba(28,24,20,0.05);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ── TopNav ── */
    .topnav { position: sticky; top: 0; z-index: 200; background: rgba(250,250,248,0.94); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); height: 56px; padding: 0 2rem; display: flex; align-items: center; }
    .topnav-brand { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; letter-spacing: 0.18em; color: var(--ink); margin-right: 2rem; }
    .topnav-back { font-size: .72rem; color: var(--ink-3); text-decoration: none; padding: .28rem .65rem; border: 1px solid var(--border-2); border-radius: 6px; margin-right: 1rem; transition: color .15s, border-color .15s, background .15s; white-space: nowrap; }
    .topnav-back:hover { color: var(--ink); border-color: var(--ink-3); background: var(--bg-3); }
    .topnav-tabs { display: flex; flex: 1; }
    .topnav-tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 0 1rem; height: 56px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.84rem; font-weight: 500; color: var(--ink-3); cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap; }
    .topnav-tab:hover { color: var(--ink-2); }
    .topnav-tab.active { color: var(--ink); font-weight: 600; border-bottom-color: var(--accent); }
    .cart-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; position: relative; padding: .3rem .5rem; margin-left: auto; }
    .cart-badge { position: absolute; top: -2px; right: -2px; background: var(--accent); color: #fff; font-size: .6rem; font-weight: 800; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; padding: .5rem 1rem; border-radius: var(--radius); font-family: 'Plus Jakarta Sans', sans-serif; font-size: .85rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #B34E2F; }
    .btn-primary:disabled { background: var(--bg-3); color: var(--ink-3); cursor: not-allowed; border-color: var(--border); }
    .btn-ghost { background: none; border-color: var(--border-2); color: var(--ink-2); }
    .btn-ghost:hover { background: var(--bg-3); color: var(--ink); border-color: var(--border-2); }
    .btn-danger { background: none; border-color: #EFCFCC; color: var(--danger); }
    .btn-danger:hover { background: #FDF2F1; }
    .btn-sm { padding: .3rem .65rem; font-size: .78rem; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; padding: .18rem .48rem; border-radius: 4px; font-size: .7rem; font-weight: 700; }
    .badge-blue   { background: #EBF4FF; color: #1A5FA8; }
    .badge-amber  { background: #FFF5E6; color: #955800; }
    .badge-green  { background: #E8F6EE; color: #1E6B39; }
    .badge-red    { background: #FCECEA; color: #A62319; }
    .badge-gray   { background: var(--bg-3); color: var(--ink-2); }
    .badge-pink   { background: #FDE9F3; color: #943066; }

    /* ── Stat cards ── */
    .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow-sm); }
    .stat-label { font-size: .68rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--ink); }

    /* ── Content card ── */
    .card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm); }
    .card-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: .9rem; font-weight: 700; color: var(--ink); }
    .card-body { padding: 1.25rem; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: .68rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; padding: .65rem 1rem; text-align: left; background: var(--bg-3); border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: .75rem 1rem; font-size: .82rem; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--ink); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(28,24,20,0.5); z-index: 400; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal { background: var(--bg-2); border: 1px solid var(--border); border-radius: 14px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(28,24,20,0.18); width: 100%; }
    .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: .95rem; font-weight: 700; color: var(--ink); }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--ink-3); padding: .2rem; line-height: 1; transition: color .15s; }
    .modal-close:hover { color: var(--ink); }
    .modal-body { padding: 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: .75rem; justify-content: flex-end; }

    /* ── Form ── */
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: .78rem; font-weight: 600; color: var(--ink-2); margin-bottom: .35rem; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: .5rem .75rem; border: 1px solid var(--border-2); border-radius: var(--radius); font-family: 'Plus Jakarta Sans', sans-serif; font-size: .85rem; background: var(--bg); color: var(--ink); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); background: var(--bg-2); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── Qty stepper ── */
    .qty-stepper { display: inline-flex; align-items: center; border: 1px solid var(--border-2); border-radius: var(--radius); overflow: hidden; }
    .qty-btn { background: none; border: none; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; color: var(--ink-2); display: flex; align-items: center; justify-content: center; transition: background .12s; }
    .qty-btn:hover:not(:disabled) { background: var(--bg-3); color: var(--ink); }
    .qty-btn:disabled { color: var(--border-2); cursor: not-allowed; }
    .qty-val { width: 40px; text-align: center; font-size: .85rem; font-weight: 600; border-left: 1px solid var(--border); border-right: 1px solid var(--border); line-height: 32px; color: var(--ink); }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500; display: flex; flex-direction: column; gap: .5rem; pointer-events: none; }
    .toast { padding: .75rem 1.25rem; border-radius: var(--radius); font-size: .85rem; font-weight: 500; min-width: 220px; box-shadow: var(--shadow-md); animation: slideIn .2s ease; }
    .toast-success { background: var(--bg-2); color: var(--ok);     border: 1px solid #B8DECA; }
    .toast-error   { background: var(--bg-2); color: var(--danger); border: 1px solid #EFC8C5; }
    .toast-info    { background: var(--bg-2); color: var(--ink);    border: 1px solid var(--border); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── Search ── */
    .search-bar { width: 100%; padding: .65rem 1rem; border: 1px solid var(--border-2); border-radius: var(--radius); font-family: 'Plus Jakarta Sans', sans-serif; font-size: .9rem; background: var(--bg-2); color: var(--ink); transition: border-color .15s, box-shadow .15s; }
    .search-bar:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .search-bar::placeholder { color: var(--ink-3); }

    /* ── Product card ── */
    .product-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.1rem; }
    .product-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .2s; background: var(--bg-2); display: flex; flex-direction: column; }
    .product-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-3px); }
    .product-card-img { height: 130px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; letter-spacing: .04em; color: rgba(255,255,255,0.7); flex-shrink: 0; }
    .product-card-body { padding: .85rem; display: flex; flex-direction: column; flex: 1; }
    .product-card-spacer { flex: 1; }
    .product-brand { font-size: .65rem; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .2rem; }
    .product-name { font-size: .84rem; font-weight: 500; line-height: 1.35; margin-bottom: .45rem; color: var(--ink); }
    .product-price { display: flex; align-items: baseline; gap: .4rem; flex-wrap: wrap; }
    .price-sale { font-size: .92rem; font-weight: 700; color: var(--ink); }
    .price-original { font-size: .76rem; color: var(--ink-3); text-decoration: line-through; }
    .price-badge { font-size: .65rem; font-weight: 700; color: var(--accent); background: var(--accent-bg); padding: .1rem .35rem; border-radius: 3px; }
    .product-tags { display: flex; gap: .3rem; flex-wrap: wrap; margin-top: .45rem; }
    .tag { font-size: .62rem; font-weight: 700; padding: .15rem .4rem; border-radius: 3px; background: var(--bg-3); color: var(--ink-2); }
    .tag-베스트 { background: #FFF5E6; color: #955800; }
    .tag-신상   { background: #E8F6EE; color: #1E6B39; }
    .tag-한정   { background: #FDE9F3; color: #943066; }

    /* ── Shop layout ── */
    .shop-layout { display: grid; grid-template-columns: 196px 1fr; gap: 1.5rem; align-items: start; }
    .filter-panel { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; position: sticky; top: 72px; box-shadow: var(--shadow-sm); }
    .filter-title { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-3); margin-bottom: .7rem; }
    .filter-section { margin-bottom: 1.2rem; }
    .filter-option { display: flex; align-items: center; gap: .5rem; font-size: .83rem; cursor: pointer; padding: .25rem 0; color: var(--ink-2); transition: color .12s; }
    .filter-option:hover { color: var(--ink); }
    .filter-option input { cursor: pointer; accent-color: var(--accent); }
    .price-btn-group { display: flex; flex-direction: column; gap: .3rem; }
    .price-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: .35rem .7rem; font-family: 'Plus Jakarta Sans', sans-serif; font-size: .78rem; cursor: pointer; text-align: left; color: var(--ink-2); transition: all .15s; }
    .price-btn:hover { border-color: var(--border-2); color: var(--ink); background: var(--bg-3); }
    .price-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

    /* ── Mobile filter ── */
    .mobile-filter-bar { display: none; align-items: center; gap: .5rem; margin-bottom: 1rem; overflow-x: auto; scrollbar-width: none; padding-bottom: .25rem; }
    .mobile-filter-bar::-webkit-scrollbar { display: none; }
    .mobile-filter-toggle { flex-shrink: 0; display: inline-flex; align-items: center; gap: .35rem; padding: .38rem .85rem; border: 1px solid var(--border-2); border-radius: 20px; background: var(--bg-2); color: var(--ink-2); font-family: 'Plus Jakarta Sans', sans-serif; font-size: .8rem; cursor: pointer; white-space: nowrap; transition: all .15s; }
    .mobile-filter-toggle.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .filter-chip { flex-shrink: 0; padding: .35rem .8rem; border: 1px solid var(--border); border-radius: 20px; font-size: .78rem; cursor: pointer; background: var(--bg-2); color: var(--ink-2); transition: all .15s; }
    .filter-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); font-weight: 600; }
    .filter-drawer { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow-sm); }

    /* ── Cart ── */
    .cart-layout { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; align-items: start; }
    .cart-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .cart-item:last-child { border-bottom: none; }
    .cart-thumb { width: 52px; height: 52px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: .85rem; font-weight: 700; color: rgba(255,255,255,0.75); flex-shrink: 0; }
    .cart-info { flex: 1; min-width: 0; }
    .cart-brand { font-size: .65rem; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .cart-name  { font-size: .85rem; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-price { font-size: .82rem; color: var(--ink-2); width: 80px; text-align: right; flex-shrink: 0; }
    .cart-sub   { font-size: .88rem; font-weight: 700; width: 90px; text-align: right; flex-shrink: 0; color: var(--ink); }
    .order-summary { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; position: sticky; top: 72px; box-shadow: var(--shadow-sm); }
    .summary-row { display: flex; justify-content: space-between; font-size: .85rem; color: var(--ink-2); padding: .35rem 0; }
    .summary-total { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; padding-top: .75rem; margin-top: .5rem; border-top: 1px solid var(--border); color: var(--ink); }

    /* ── Home hero ── */
    .hero-wrap { background: linear-gradient(140deg, #FFF8F4 0%, #FFF2EB 45%, #FAFAF8 100%); border-bottom: 1px solid var(--border); padding: 5rem 0 4rem; overflow: hidden; position: relative; }
    .hero-wrap::before { content: 'IGH'; position: absolute; right: 3%; top: 50%; transform: translateY(-50%); font-family: 'Playfair Display', serif; font-size: 22rem; font-weight: 700; color: rgba(199,91,58,0.055); letter-spacing: .08em; pointer-events: none; line-height: 1; user-select: none; }
    .hero-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    .hero-tag { font-size: .68rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: 3.6rem; font-weight: 600; line-height: 1.1; margin-bottom: 1.1rem; color: var(--ink); }
    .hero-sub { font-size: .93rem; color: var(--ink-2); margin-bottom: 2.5rem; line-height: 1.75; max-width: 380px; }

    /* ── Home content ── */
    .home-content { max-width: 1100px; margin: 0 auto; padding: 2.75rem 1.5rem 4rem; }
    .section-heading { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; margin-bottom: 1.1rem; color: var(--ink); letter-spacing: .01em; }
    .section-sep { height: 1px; background: var(--border); margin: 2.25rem 0; }
    .brand-strip { display: flex; gap: .9rem; overflow-x: auto; padding-bottom: .75rem; margin-bottom: 2.5rem; scrollbar-width: none; scroll-snap-type: x mandatory; }
    .brand-strip::-webkit-scrollbar { display: none; }
    .brand-card { flex-shrink: 0; width: 152px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1rem; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .2s; text-align: center; scroll-snap-align: start; box-shadow: var(--shadow-sm); }
    .brand-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .brand-circle { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto .7rem; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: .9rem; font-weight: 700; letter-spacing: .04em; color: rgba(255,255,255,0.8); }
    .brand-name { font-size: .82rem; font-weight: 700; letter-spacing: .03em; margin-bottom: .3rem; color: var(--ink); }
    .brand-tagline { font-size: .7rem; color: var(--ink-3); line-height: 1.45; }
    .cat-grid { display: flex; gap: .55rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
    .cat-chip { padding: .4rem .9rem; border: 1px solid var(--border-2); border-radius: 20px; font-size: .8rem; cursor: pointer; transition: all .15s; background: var(--bg-2); color: var(--ink-2); }
    .cat-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .cat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
    .feat-strip { display: flex; gap: .9rem; overflow-x: auto; padding-bottom: .75rem; scrollbar-width: none; scroll-snap-type: x mandatory; }
    .feat-strip::-webkit-scrollbar { display: none; }
    .feat-card { flex-shrink: 0; width: 185px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .2s; scroll-snap-align: start; box-shadow: var(--shadow-sm); }
    .feat-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .feat-img { height: 115px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: rgba(255,255,255,0.7); }
    .feat-body { padding: .75rem; }
    .feat-brand { font-size: .63rem; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; }
    .feat-name  { font-size: .82rem; font-weight: 500; line-height: 1.35; margin: .22rem 0 .3rem; color: var(--ink); }
    .feat-price { font-size: .88rem; font-weight: 700; color: var(--accent); }

    /* ── Product modal ── */
    .prod-modal-inner { display: grid; grid-template-columns: 1fr 1fr; }
    .prod-modal-img { display: flex; align-items: center; justify-content: center; height: 300px; font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; color: rgba(255,255,255,0.65); }
    .prod-modal-info { padding: 1.75rem; }
    .prod-modal-brand { font-size: .68rem; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .4rem; }
    .prod-modal-name  { font-size: 1.1rem; font-weight: 600; line-height: 1.3; margin-bottom: .5rem; color: var(--ink); }
    .prod-rating { font-size: .8rem; color: var(--accent); margin-bottom: .75rem; }
    .prod-modal-price { font-size: 1.45rem; font-weight: 700; margin-bottom: .25rem; color: var(--ink); }
    .prod-modal-original { font-size: .83rem; color: var(--ink-3); margin-bottom: .75rem; }
    .prod-modal-desc { font-size: .82rem; color: var(--ink-2); line-height: 1.7; margin-bottom: 1rem; }
    .prod-stock { display: inline-flex; align-items: center; gap: .3rem; font-size: .76rem; font-weight: 600; padding: .28rem .7rem; border-radius: 20px; margin-bottom: 1rem; }
    .prod-stock.ok  { background: #E8F6EE; color: var(--ok); }
    .prod-stock.low { background: #FFF5E6; color: var(--warn); }
    .prod-stock.out { background: #FCECEA; color: var(--danger); }
    .qty-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }

    /* ── Admin chart ── */

      { id:'p09', brandId:'b3', category:'스포츠',  name:'VELO 트레이닝 재킷',          price:98000,  originalPrice:98000,  discount:0,  description:'경량 윈드브레이커 소재. 전면 풀집 + 양쪽 핸드포켓. 리플렉티브 로고.',            rating:4.6, reviewCount:115, tags:['신상'] },
      { id:'p10', brandId:'b4', category:'리빙',    name:'MASO 워시드 린넨 쿠션커버',   price:28000,  originalPrice:28000,  discount:0,  description:'벨기에산 린넨 100%. 자연스러운 워싱 텍스처. 45×45cm. 지퍼 마감.',               rating:4.4, reviewCount:89,  tags:[] },
      { id:'p11', brandId:'b4', category:'리빙',    name:'MASO 오크 우드 트레이',       price:45000,  originalPrice:56000,  discount:20, description:'천연 오크 단목. 왁스 피니쉬. 250×350mm. 욕실·주방·침실 다용도.',                rating:4.7, reviewCount:132, tags:['베스트'] },
      { id:'p12', brandId:'b4', category:'리빙',    name:'MASO 콘크리트 캔들홀더 세트', price:62000,  originalPrice:75000,  discount:17, description:'핸드메이드 콘크리트 홀더 2개 세트. 소·중 사이즈. 필라 캔들 호환.',               rating:4.3, reviewCount:64,  tags:['한정'] },
      { id:'p13', brandId:'b5', category:'여성패션', name:'ELLE.K 플로럴 미디원피스',    price:128000, originalPrice:128000, discount:0,  description:'실크 혼방 새틴 소재. 플로럴 패턴. 허리 드로스트링. A라인 미디 기장.',           rating:4.6, reviewCount:178, tags:['신상'] },
      { id:'p14', brandId:'b5', category:'여성패션', name:'ELLE.K 실크 블라우스',        price:96000,  originalPrice:120000, discount:20, description:'모멀리 실크 100%. 리본 넥 타이. 루즈 핏. 오피스룩·데일리룩 겸용.',              rating:4.8, reviewCount:245, tags:['베스트'] },
      { id:'p15', brandId:'b5', category:'여성패션', name:'ELLE.K 캐시미어 가디건',      price:178000, originalPrice:178000, discount:0,  description:'몽골산 캐시미어 100%. 드롭 숄더 오버사이즈. 크롭 기장. 4컬러.',                 rating:4.9, reviewCount:302, tags:['베스트','한정'] },
    ];

    const INIT_INVENTORY = {
      p01:{qty:42,threshold:5}, p02:{qty:8,threshold:5},  p03:{qty:3,threshold:5},
      p04:{qty:25,threshold:5}, p05:{qty:0,threshold:5},  p06:{qty:12,threshold:3},
      p07:{qty:60,threshold:10},p08:{qty:4,threshold:5},  p09:{qty:18,threshold:5},
      p10:{qty:35,threshold:5}, p11:{qty:2,threshold:3},  p12:{qty:7,threshold:3},
      p13:{qty:22,threshold:5}, p14:{qty:15,threshold:5}, p15:{qty:6,threshold:5},
    };

    const SEED_ORDERS = [
      { id:'ORD-1715000001-ABC', items:[{productId:'p01',name:'LUMI 글로우 세럼 30ml',price:68000,qty:2}], totalAmount:136000, status:'delivered', createdAt:'2026-05-01T10:00:00.000Z' },
      { id:'ORD-1715000002-DEF', items:[{productId:'p14',name:'ELLE.K 실크 블라우스',price:96000,qty:1},{productId:'p10',name:'MASO 워시드 린넨 쿠션커버',price:28000,qty:2}], totalAmount:152000, status:'shipping', createdAt:'2026-05-10T14:30:00.000Z' },
      { id:'ORD-1715000003-GHI', items:[{productId:'p08',name:'VELO 컴프레션 티셔츠',price:38000,qty:3}], totalAmount:114000, status:'paid', createdAt:'2026-05-15T09:00:00.000Z' },
      { id:'ORD-1715000004-JKL', items:[{productId:'p06',name:'ARCO 울 오버코트',price:248000,qty:1}], totalAmount:248000, status:'cancelled', createdAt:'2026-05-03T16:00:00.000Z' },
      { id:'ORD-1715000005-MNO', items:[{productId:'p15',name:'ELLE.K 캐시미어 가디건',price:178000,qty:1},{productId:'p03',name:'LUMI 토닝 앰플 15ml',price:89000,qty:1}], totalAmount:267000, status:'delivered', createdAt:'2026-05-12T11:00:00.000Z' },
    ];

    function loadOrInit(key, fallback) {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
      catch { return fallback; }
    }
    function save(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
    function fmt(n) { return Number(n).toLocaleString('ko-KR') + '원'; }
    function fmtDate(iso) {
      const d = new Date(iso);
      const yy = String(d.getFullYear()).slice(2);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const time = d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      return `${yy}.${mm}.${dd} ${time}`;
    }
    function makeOrderId() {
      return `ORD-${Date.now()}-${Math.random().toString(36).slice(2,5).toUpperCase()}`;
    }
    function getBrand(brandId) { return BRANDS.find(b => b.id === brandId); }

    const StoreContext = createContext(null);

    function StoreProvider({ children }) {
      const [products,   setProducts]   = useState(() => loadOrInit('dept-products',  INIT_PRODUCTS));
      const [inventory,  setInventory]  = useState(() => loadOrInit('dept-inventory', INIT_INVENTORY));
      const [orders,     setOrders]     = useState(() => loadOrInit('dept-orders',    SEED_ORDERS));
      const [cartItems,  setCartItems]  = useState(() => loadOrInit('dept-cart',      []));
      const [currentTab, setCurrentTab] = useState('home');
      const [shopFilter, setShopFilter] = useState({ brands:[], category:'전체', priceRange:'all', search:'' });
      const [modal,      setModal]      = useState(null);
      const [toasts,     setToasts]     = useState([]);

      useEffect(() => { save('dept-products',  products);  }, [products]);
      useEffect(() => { save('dept-inventory', inventory); }, [inventory]);
      useEffect(() => { save('dept-orders',    orders);    }, [orders]);
      useEffect(() => { save('dept-cart',      cartItems); }, [cartItems]);

      function toast(msg, type = 'info') {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, msg, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
      }

      function addToCart(product, qty = 1) {
        const brand = getBrand(product.brandId);
        setCartItems(prev => {
          const ex = prev.find(ci => ci.productId === product.id);
          if (ex) return prev.map(ci => ci.productId === product.id ? { ...ci, qty: ci.qty + qty } : ci);
          return [...prev, { productId:product.id, name:product.name, brandName:brand?.name ?? '', price:product.price, qty, brandColor:brand?.color ?? '#A8A09A' }];
        });
      }

      function updateCartQty(productId, qty) {
        if (qty <= 0) setCartItems(prev => prev.filter(ci => ci.productId !== productId));
        else setCartItems(prev => prev.map(ci => ci.productId === productId ? { ...ci, qty } : ci));
      }

      function removeFromCart(productId) {
        setCartItems(prev => prev.filter(ci => ci.productId !== productId));
      }

      function placeOrder() {
        for (const ci of cartItems) {
          const stock = inventory[ci.productId]?.qty ?? 0;
          if (stock < ci.qty) throw new Error(`재고 부족: ${ci.name} (남은 수량 ${stock}개)`);
        }
        setInventory(prev => {
          const next = { ...prev };
          cartItems.forEach(ci => { next[ci.productId] = { ...next[ci.productId], qty: next[ci.productId].qty - ci.qty }; });
          return next;
        });
        const order = {
          id: makeOrderId(),
          items: cartItems.map(ci => ({ productId:ci.productId, name:ci.name, price:ci.price, qty:ci.qty })),
          totalAmount: cartItems.reduce((s, ci) => s + ci.price * ci.qty, 0),
          status: 'paid',
          createdAt: new Date().toISOString(),
        };
        setOrders(prev => [order, ...prev]);
        setCartItems([]);
        return order;
      }

      function addProduct(data) {
        const newId = 'p' + String(Date.now()).slice(-6);
        setProducts(prev => [...prev, { ...data, id: newId }]);
        setInventory(prev => ({ ...prev, [newId]: { qty: 10, threshold: 5 } }));
      }

      function updateProduct(id, data) {
        setProducts(prev => prev.map(p => p.id === id ? { ...p, ...data } : p));
      }

      function deleteProduct(id) {
        setProducts(prev => prev.filter(p => p.id !== id));
        setCartItems(prev => prev.filter(ci => ci.productId !== id));
      }

      function adjustInventory(productId, delta) {
        setInventory(prev => ({
          ...prev,
          [productId]: { ...prev[productId], qty: Math.max(0, (prev[productId]?.qty ?? 0) + delta) },
        }));
      }

      function goToShop(filterOverride = {}) {
        setShopFilter(prev => ({ ...prev, ...filterOverride }));
        setCurrentTab('shop');
      }

      return (
        <StoreContext.Provider value={{
          products, inventory, orders, cartItems,
          currentTab, setCurrentTab,
          shopFilter, setShopFilter,
          modal, setModal,
          toasts, toast,
          addToCart, updateCartQty, removeFromCart, placeOrder,
          addProduct, updateProduct, deleteProduct,
          adjustInventory, goToShop,
        }}>
          {children}
        </StoreContext.Provider>
      );
    }

    function ToastContainer({ toasts }) {
      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
          ))}
        </div>
      );
    }

    function TopNav() {
      const { currentTab, setCurrentTab, cartItems } = useContext(StoreContext);
      const cartCount = cartItems.reduce((s, ci) => s + ci.qty, 0);
      const TABS = [
        { id:'home',  label:'홈' },
        { id:'shop',  label:'쇼핑몰' },
        { id:'cart',  label:'장바구니·주문' },
        { id:'admin', label:'관리자' },
      ];
      return (
        <nav className="topnav">
          <a href="/" className="topnav-back">← 포트폴리오</a>
          <span className="topnav-brand">IGH</span>
          <div className="topnav-tabs">
            {TABS.map(t => (
              <button key={t.id}
                className={`topnav-tab${currentTab === t.id ? ' active' : ''}`}
                onClick={() => setCurrentTab(t.id)}>
                {t.label}
              </button>
            ))}
          </div>
          <button className="cart-btn" onClick={() => setCurrentTab('cart')}>
            🛒
            {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
          </button>
        </nav>
      );
    }

    function HomeTab() {
      const { products, goToShop, setModal } = useContext(StoreContext);

      const featured = useMemo(() => {
        return BRANDS.map(b => products.find(p => p.brandId === b.id)).filter(Boolean);
      }, [products]);

      const CAT_ICONS = { '전체':'🏬', '여성패션':'👗', '남성패션':'👔', '뷰티':'💄', '리빙':'🛋', '스포츠':'🏃' };

      return (
        <>
          <section className="hero-wrap">
            <div className="hero-inner">
              <div className="hero-tag">2026 Summer Collection</div>
              <div className="hero-title">새로운 시즌,<br/>새로운 나를 만나다</div>
              <div className="hero-sub">IGH가 엄선한 브랜드와 함께 이번 여름을 완성하세요.</div>
              <button className="btn btn-primary" onClick={() => goToShop()}>
                지금 쇼핑하기 →
              </button>
            </div>
          </section>

          <div className="home-content">
            <div className="section-heading">브랜드</div>
            <div className="brand-strip">
              {BRANDS.map(b => (
                <div key={b.id} className="brand-card" onClick={() => goToShop({ brands:[b.id], category:'전체' })}>
                  <div className="brand-circle" style={{background: b.color}}>{b.name}</div>
                  <div className="brand-name">{b.name}</div>
                  <div className="brand-tagline">{b.tagline}</div>
                </div>
              ))}
            </div>

            <div className="section-heading">카테고리</div>
            <div className="cat-grid">
              {CATEGORIES.map(c => (
                <div key={c} className="cat-chip" onClick={() => goToShop({ category: c, brands:[] })}>
                  {CAT_ICONS[c] ?? ''} {c}
                </div>
              ))}
            </div>

            <div className="section-sep" />

            <div className="section-heading">이번 주 베스트</div>
            <div className="feat-strip">
              {featured.map(p => {
                const brand = getBrand(p.brandId);
                return (
                  <div key={p.id} className="feat-card" onClick={() => setModal({ type:'product', product:p })}>
                    <div className="feat-img" style={{background: brand?.color ?? '#A8A09A'}}>
                      {brand?.name}
                    </div>
                    <div className="feat-body">
                      <div className="feat-brand">{brand?.name}</div>
                      <div className="feat-name">{p.name}</div>
                      <div className="feat-price">{fmt(p.price)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      );
    }

    const PRICE_RANGES = [
      { id:'all',    label:'전체' },
      { id:'~50',    label:'5만원 이하',  test: p => p.price <= 50000 },
      { id:'50~100', label:'5~10만원',    test: p => p.price > 50000 && p.price <= 100000 },
      { id:'100~',   label:'10만원 이상', test: p => p.price > 100000 },
    ];

    function ShopTab() {
      const { products, inventory, shopFilter, setShopFilter, setModal, addToCart, toast } = useContext(StoreContext);
      const [mobileFilterOpen, setMobileFilterOpen] = useState(false);

      const activeFilterCount = useMemo(() => {
        let c = 0;
        if (shopFilter.brands.length) c++;
        if (shopFilter.category !== '전체') c++;
        if (shopFilter.priceRange !== 'all') c++;
        return c;
      }, [shopFilter]);

      const filtered = useMemo(() => {
        return products.filter(p => {
          if (shopFilter.brands.length && !shopFilter.brands.includes(p.brandId)) return false;
          if (shopFilter.category !== '전체' && p.category !== shopFilter.category) return false;
          if (shopFilter.priceRange !== 'all') {
            const range = PRICE_RANGES.find(r => r.id === shopFilter.priceRange);
            if (range && !range.test(p)) return false;
          }
          if (shopFilter.search) {
            const q = shopFilter.search.toLowerCase();
            const brand = getBrand(p.brandId);
            if (!p.name.toLowerCase().includes(q) && !brand?.name.toLowerCase().includes(q)) return false;
          }
          return true;
        });
      }, [products, shopFilter]);

      function toggleBrand(id) {
        setShopFilter(prev => ({
          ...prev,
          brands: prev.brands.includes(id) ? prev.brands.filter(b => b !== id) : [...prev.brands, id],
        }));
      }

      function handleAddToCart(e, p) {
        e.stopPropagation();
        addToCart(p, 1);
        toast(`${p.name} 장바구니에 담았습니다`, 'success');
      }

      function resetFilter() {
        setShopFilter({ brands:[], category:'전체', priceRange:'all', search:'' });
        setMobileFilterOpen(false);
      }

      const FilterContent = () => (
        <>
          <div className="filter-section">
            <div className="filter-title">브랜드</div>

    function SalesChart() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const pad = { top: 20, right: 20, bottom: 40, left: 65 };
        ctx.clearRect(0, 0, W, H);
        const maxVal = Math.max(...CHART_DATA.map(d => d.value));
        const chartW = W - pad.left - pad.right;
        const chartH = H - pad.top - pad.bottom;
        const barW = (chartW / CHART_DATA.length) * 0.55;
        const gap   = chartW / CHART_DATA.length;

        [0, 0.25, 0.5, 0.75, 1].forEach(ratio => {
          const y = pad.top + chartH - ratio * chartH;
          ctx.fillStyle = '#A8A09A';
          ctx.font = '11px Plus Jakarta Sans, sans-serif';
          ctx.textAlign = 'right';
          ctx.fillText(fmt(maxVal * ratio).replace('원',''), pad.left - 8, y + 4);
          ctx.strokeStyle = '#E6E0D8';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        });

        CHART_DATA.forEach((d, i) => {
          const x = pad.left + i * gap + (gap - barW) / 2;
          const barH = (d.value / maxVal) * chartH;
          const y = pad.top + chartH - barH;
          ctx.fillStyle = '#C75B3A';
          ctx.beginPath();
          ctx.roundRect(x, y, barW, barH, 3);
          ctx.fill();
          ctx.fillStyle = '#A8A09A';
          ctx.font = '11px Plus Jakarta Sans, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(d.label, x + barW / 2, H - pad.bottom + 16);
        });
      }, []);

      return (
        <div className="chart-wrap">
          <canvas ref={canvasRef} width={700} height={230} style={{width:'100%',height:'auto'}} />
        </div>
      );
    }

    function ProductFormModal() {
      const { modal, setModal, addProduct, updateProduct, toast } = useContext(StoreContext);
      const editing = modal?.product ?? null;
      const [form, setForm] = useState(() => editing
        ? { ...editing, price: String(editing.price), originalPrice: String(editing.originalPrice), discount: String(editing.discount), tags: editing.tags.join(',') }
        : EMPTY_FORM
      );

      function set(field, value) { setForm(prev => ({ ...prev, [field]: value })); }

      function handleDiscountChange(val) {
        setForm(prev => {
          const disc = Number(val) || 0;
          const orig = Number(prev.originalPrice) || Number(prev.price) || 0;
          const newPrice = disc > 0 && orig > 0 ? String(Math.round(orig * (1 - disc / 100))) : prev.price;
          return { ...prev, discount: val, price: newPrice };
        });
      }

      function handleOriginalPriceChange(val) {
        setForm(prev => {
          const orig = Number(val) || 0;
          const disc = Number(prev.discount) || 0;
          const newPrice = disc > 0 && orig > 0 ? String(Math.round(orig * (1 - disc / 100))) : val;
          return { ...prev, originalPrice: val, price: newPrice };
        });
      }

      function handleSubmit() {
        if (!form.name.trim()) { toast('상품명을 입력하세요', 'error'); return; }
        if (!form.price || isNaN(Number(form.price))) { toast('올바른 가격을 입력하세요', 'error'); return; }
        const data = {
          brandId: form.brandId, category: form.category,
          name: form.name.trim(),
          price: Number(form.price),
          originalPrice: form.originalPrice.trim() ? Number(form.originalPrice) : Number(form.price),
          discount: Number(form.discount) || 0,
          description: form.description.trim(),
          rating: editing?.rating ?? 4.0,
          reviewCount: editing?.reviewCount ?? 0,
          tags: form.tags.split(',').map(t => t.trim()).filter(Boolean),
        };
        if (editing) { updateProduct(editing.id, data); toast('상품이 수정되었습니다', 'success'); }
        else         { addProduct(data);                toast('상품이 등록되었습니다', 'success'); }
        setModal(null);
      }

      return (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal" style={{maxWidth:'480px'}} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{editing ? '상품 수정' : '상품 등록'}</span>
              <button className="modal-close" onClick={() => setModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">브랜드</label>
                  <select className="form-select" value={form.brandId} onChange={e => set('brandId', e.target.value)}>
                    {BRANDS.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">카테고리</label>
                  <select className="form-select" value={form.category} onChange={e => set('category', e.target.value)}>
                    {CATEGORIES.filter(c => c !== '전체').map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">상품명</label>
                <input className="form-input" value={form.name} onChange={e => set('name', e.target.value)} placeholder="상품명 입력" />
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">판매가 (원)</label>
                  <input className="form-input" type="number" value={form.price} onChange={e => set('price', e.target.value)} placeholder="0" />
                </div>
                <div className="form-group">
                  <label className="form-label">정가 (원)</label>
                  <input className="form-input" type="number" value={form.originalPrice} onChange={e => handleOriginalPriceChange(e.target.value)} placeholder="0" />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">할인율 (%)</label>
                <input className="form-input" type="number" min="0" max="100" value={form.discount} onChange={e => handleDiscountChange(e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">상품 설명</label>
                <textarea className="form-textarea" value={form.description} onChange={e => set('description', e.target.value)} placeholder="상품 설명 입력" />
              </div>
              <div className="form-group">
                <label className="form-label">태그 (쉼표 구분: 베스트,신상,한정)</label>
                <input className="form-input" value={form.tags} onChange={e => set('tags', e.target.value)} placeholder="베스트,신상" />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={() => setModal(null)}>취소</button>
              <button className="btn btn-primary" onClick={handleSubmit}>{editing ? '수정 완료' : '등록'}</button>
            </div>
          </div>
        </div>
      );
    }

    function AppInner() {
      const { currentTab, modal, toasts } = useContext(StoreContext);
      return (
        <>
          <TopNav />
          {currentTab === 'home'  && <HomeTab />}
          {currentTab === 'shop'  && <ShopTab />}
          {currentTab === 'cart'  && <CartTab />}
          {currentTab === 'admin' && <AdminTab />}
          {modal?.type === 'product'     && <ProductModal />}
          {modal?.type === 'productForm' && <ProductFormModal />}
          <ToastContainer toasts={toasts} />
        </>
      );
    }

    function App() {
      return (
        <StoreProvider>
          <AppInner />
        </StoreProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
