<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커머스 시스템 | 임광호 포트폴리오</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --hero-from:  #0f172a;
      --hero-to:    #1e293b;
      --accent:     #6366f1;
      --accent-dim: #818cf8;
      --accent-bg:  #ede9fe;
      --bg:         #f1f5f9;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --text-2:     #64748b;
      --text-3:     #94a3b8;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TopNav ── */
    .topnav { position: sticky; top: 0; z-index: 200; background: rgba(9,9,14,0.97); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 0 2rem; display: flex; align-items: center; gap: 0.4rem; height: 54px; }
    .topnav-logo { font-weight: 800; font-size: 0.9rem; color: #fff; text-decoration: none; margin-right: auto; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    .topnav-link { font-size: 0.79rem; font-weight: 500; color: rgba(255,255,255,0.45); padding: 0.35rem 0.65rem; border-radius: 7px; cursor: pointer; transition: color 0.15s, background 0.15s; white-space: nowrap; }
    .topnav-link:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.08); }
    .topnav-link.active { color: #a5b4fc; background: rgba(99,102,241,0.15); font-weight: 600; }
    .nav-dropdown { position: relative; }
    .nav-dropdown-menu { position: absolute; top: calc(100% + 6px); right: 0; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0.4rem; min-width: 150px; flex-direction: column; gap: 0.15rem; z-index: 300; }
    .nav-dropdown-menu.open { display: flex; }
    .nav-dropdown-menu:not(.open) { display: none; }
    .nav-dropdown-item { font-size: 0.79rem; color: rgba(255,255,255,0.65); padding: 0.45rem 0.75rem; border-radius: 7px; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; }
    .nav-dropdown-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .user-toggle { display: flex; align-items: center; background: rgba(255,255,255,0.07); border-radius: 20px; padding: 0.2rem 0.3rem; gap: 0.1rem; }
    .user-toggle-btn { font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.4); padding: 0.2rem 0.55rem; border-radius: 14px; cursor: pointer; transition: all 0.15s; }
    .user-toggle-btn.active { background: #6366f1; color: #fff; }
    .cart-nav-btn { position: relative; font-size: 1.05rem; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 7px; transition: background 0.15s; color: rgba(255,255,255,0.7); }
    .cart-nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .cart-nav-badge { position: absolute; top: -1px; right: -2px; background: #ef4444; color: #fff; font-size: 0.56rem; font-weight: 800; border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }
    .nav-alert-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #ef4444; margin-left: 0.25rem; vertical-align: middle; }

    /* ── Layout ── */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Home Launcher ── */
    .home-body { background: var(--bg); padding: 1.5rem; height: calc(100vh - 54px); display: flex; align-items: stretch; }
    .home-grid { display: flex; gap: 1rem; width: 100%; }
    .hero-panel {
      width: 34%; background: linear-gradient(145deg, var(--hero-from) 0%, var(--hero-to) 60%, #1e3a5f 100%);
      border-radius: 16px; padding: 1.5rem; color: #fff;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .hero-panel::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 130px; height: 130px; background: rgba(99,102,241,0.15); border-radius: 50%;
    }
    .hero-panel::after {
      content: ''; position: absolute; bottom: 30px; left: -25px;
      width: 90px; height: 90px; background: rgba(99,102,241,0.08); border-radius: 50%;
    }
    .hero-tag { font-size: 0.65rem; color: var(--accent-dim); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .hero-title { font-size: 1.35rem; font-weight: 800; line-height: 1.25; }
    .hero-title .hl { color: var(--accent-dim); }
    .hero-desc { font-size: 0.72rem; color: rgba(255,255,255,0.5); line-height: 1.6; margin-top: 0.6rem; }
    .hero-user { display: flex; align-items: center; gap: 0.6rem; background: rgba(255,255,255,0.07); border-radius: 10px; padding: 0.5rem 0.75rem; border: 1px solid rgba(255,255,255,0.08); }
    .hero-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent-dim)); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; flex-shrink: 0; }
    .hero-user-name { font-size: 0.72rem; font-weight: 700; }
    .hero-user-role { font-size: 0.6rem; color: rgba(255,255,255,0.45); }
    .tile-area { flex: 1; display: flex; flex-direction: column; }
    .tile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; flex: 1; }
    .tile {
      background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.4rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      padding: 1rem 0.5rem;
    }
    .tile:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); transform: translateY(-2px); }
    .tile-icon { font-size: 1.7rem; line-height: 1; }
    .tile-name { font-size: 0.78rem; font-weight: 700; color: var(--text); }
    .tile-sub { font-size: 0.62rem; color: var(--text-3); }

    /* ── Sub-view Shell ── */
    .sv-body { background: var(--bg); padding: 1.5rem; min-height: calc(100vh - 54px); }
    .sv-breadcrumb { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 1rem; font-size: 0.72rem; color: var(--text-3); }
    .sv-breadcrumb .sv-back { color: var(--accent); font-weight: 700; cursor: pointer; }
    .sv-breadcrumb .sv-back:hover { text-decoration: underline; }
    .sv-breadcrumb .sv-sep { color: var(--border); }
    .sv-breadcrumb .sv-cur { color: var(--text); font-weight: 600; }
    .sv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .sv-title { font-size: 1rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 0.4rem; }
    .sv-actions { display: flex; gap: 0.4rem; }
    .sv-stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    @media (max-width: 768px) { .sv-stat-row { grid-template-columns: repeat(2, 1fr); } }
    .sv-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; }
    .sv-stat-label { font-size: 0.62rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .sv-stat-val { font-size: 1.2rem; font-weight: 800; color: var(--text); line-height: 1; }
    .sv-stat-val.accent { color: var(--accent); }
    .sv-stat-val.warn   { color: #f59e0b; }
    .sv-stat-val.ok     { color: #10b981; }
    .sv-stat-val.danger { color: #ef4444; }
    .sv-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .sv-card-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--bg); display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .sv-card-title { font-size: 0.82rem; font-weight: 700; color: var(--text-2); }
    .sv-search { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 0.3rem 0.7rem 0.3rem 1.8rem; font: inherit; font-size: 0.78rem; color: var(--text); width: 180px; }
    .sv-search-wrap { position: relative; }
    .sv-search-icon { position: absolute; left: 0.5rem; top: 50%; transform: translateY(-50%); font-size: 0.75rem; color: var(--text-3); pointer-events: none; }
    .sv-tabs { display: flex; gap: 0.15rem; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .sv-tab { padding: 0.3rem 0.85rem; border-radius: 6px; font-size: 0.78rem; font-weight: 600; color: var(--text-3); cursor: pointer; transition: all 0.12s; }
    .sv-tab.active { background: var(--accent-bg); color: var(--accent); }
    .sv-tab:hover:not(.active) { background: var(--bg); color: var(--text-2); }

    .page-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .page-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    .back-link { color: #6366f1; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-bottom: 1.25rem; display: inline-flex; align-items: center; gap: 0.25rem; }

    /* ── Onboarding Banner ── */
    .onboarding-banner { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: #fff; border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; position: relative; }
    .onboarding-title { font-size: 0.98rem; font-weight: 700; margin-bottom: 0.35rem; }
    .onboarding-desc { font-size: 0.81rem; opacity: 0.85; margin-bottom: 0.85rem; line-height: 1.5; }
    .onboarding-steps { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .onboarding-step { font-size: 0.75rem; background: rgba(255,255,255,0.18); border-radius: 20px; padding: 0.22rem 0.7rem; }
    .onboarding-close { position: absolute; top: 0.9rem; right: 1rem; background: none; border: none; color: rgba(255,255,255,0.65); font-size: 1.15rem; cursor: pointer; line-height: 1; }
    .onboarding-close:hover { color: #fff; }

    /* ── Dashboard Stats ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card { background: #fff; border-radius: 14px; padding: 1.25rem 1.4rem; border: 1px solid #ebebeb; }
    .stat-icon { font-size: 1.4rem; margin-bottom: 0.45rem; }
    .stat-label { font-size: 0.71rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .stat-value { font-size: 1.6rem; font-weight: 800; color: #1a1a1a; line-height: 1; }
    .stat-value.sm { font-size: 1.15rem; }
    .stat-sub { font-size: 0.73rem; color: #bbb; margin-top: 0.3rem; }
    .stat-card.stat-alert .stat-value { color: #dc2626; }
    .stat-card.stat-warn .stat-value { color: #d97706; }

    /* ── Bar Chart ── */
    .chart-section { background: #fff; border-radius: 14px; border: 1px solid #ebebeb; padding: 1.4rem 1.5rem; margin-bottom: 1.5rem; }
    .chart-title { font-size: 0.85rem; font-weight: 700; color: #555; margin-bottom: 1.1rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: 0.65rem; height: 110px; }
    .bar-item { display: flex; flex-direction: column; align-items: center; gap: 0.28rem; flex: 1; min-width: 0; }
    .bar-fill { width: 100%; border-radius: 5px 5px 0 0; background: linear-gradient(180deg, #818cf8, #6366f1); transition: height 0.5s ease; min-height: 4px; }
    .bar-label { font-size: 0.62rem; color: #aaa; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
    .bar-value { font-size: 0.63rem; font-weight: 700; color: #6366f1; }

    /* ── Dashboard misc ── */
    .dash-section-title { font-size: 0.88rem; font-weight: 700; color: #555; margin-bottom: 0.75rem; }
    .dash-quick-links { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .dash-link-card { background: #fff; border: 1px solid #ebebeb; border-radius: 12px; padding: 0.8rem 1.2rem; cursor: pointer; font-size: 0.84rem; font-weight: 600; color: #444; display: flex; align-items: center; gap: 0.4rem; transition: all 0.15s; }
    .dash-link-card:hover { border-color: #6366f1; color: #6366f1; background: rgba(99,102,241,0.04); transform: translateY(-1px); }

    /* ── Filter Bar ── */
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .filter-btn { border: 1px solid #e0e0e0; background: #fff; color: #666; border-radius: 20px; padding: 0.4rem 1rem; font: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.12s; }
    .filter-btn.active { border-color: #6366f1; background: rgba(99,102,241,0.1); color: #4338ca; }

    /* ── Search ── */
    .search-wrap { position: relative; margin-left: auto; }
    .search-input { border: 1px solid #e2e8f0; border-radius: 9px; padding: 0.42rem 0.85rem 0.42rem 2rem; font: inherit; font-size: 0.82rem; background: #fff; width: 185px; }
    .search-input:focus { outline: none; border-color: #6366f1; }
    .search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 0.85rem; pointer-events: none; }

    /* ── Product Grid & Card ── */
    .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
    @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .card-grid { grid-template-columns: 1fr; } }
    .product-card { background: #fff; border-radius: 16px; padding: 1.25rem; border: 1px solid #ebebeb; transition: box-shadow 0.2s, transform 0.2s; cursor: pointer; position: relative; display: flex; flex-direction: column; }
    .product-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.09); transform: translateY(-2px); }
    .product-card.unavailable { opacity: 0.55; }
    .card-badge-wrap { position: absolute; top: 1rem; right: 1rem; }
    .product-emoji-box { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; margin-bottom: 0.75rem; }
    .cat-전자기기 { background: #eff6ff; }
    .cat-가구 { background: #fef9ee; }
    .cat-소모품 { background: #f0fdf4; }
    .cat-기타 { background: #f5f3ff; }
    .product-name { font-weight: 700; font-size: 0.97rem; margin-bottom: 0.2rem; }
    .product-category { font-size: 0.74rem; color: #999; margin-bottom: 0.6rem; }
    .product-price { font-size: 1.1rem; font-weight: 800; color: #1a1a1a; margin-bottom: 0.5rem; }
    .stock-bar-wrap { margin-bottom: 0.45rem; }
    .stock-bar-bg { height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
    .stock-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .product-stock { font-size: 0.77rem; color: #888; margin-bottom: 0.85rem; }
    .product-stock.low { color: #d97706; font-weight: 600; }
    .product-stock.zero { color: #dc2626; font-weight: 700; }
    .card-actions { display: flex; gap: 0.45rem; margin-top: auto; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.5rem; border-radius: 20px; }
    .badge-sold-out     { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .badge-suspended    { background: #fefce8; color: #ca8a04; border: 1px solid #fef08a; }
    .badge-discontinued { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; }
    .badge-paid         { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .badge-shipping     { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
    .badge-delivered    { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .badge-cancelled    { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; }
    .badge-active       { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .badge-b2b          { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }
    .badge-admin        { background: #1e1b4b; color: #a5b4fc; border: 1px solid #3730a3; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.55rem 1.1rem; border-radius: 9px; font: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #c7d2fe; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-sm { padding: 0.28rem 0.65rem; font-size: 0.76rem; border-radius: 7px; }
    .btn-qty { width: 32px; height: 32px; padding: 0; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; font-size: 1rem; cursor: pointer; font-family: inherit; }
    .btn-qty:hover { background: #e2e8f0; }
    .btn-qty:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Product Detail ── */
    .detail-wrap { max-width: 640px; }
    .detail-emoji { font-size: 4rem; display: block; margin-bottom: 0.75rem; }
    .detail-name { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.35rem; }
    .detail-category { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .price-row { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .price-item { padding: 0.75rem 1.1rem; border-radius: 12px; border: 2px solid #e5e7eb; min-width: 130px; }
    .price-item.active { border-color: #6366f1; background: rgba(99,102,241,0.05); }
    .price-label { font-size: 0.71rem; font-weight: 700; color: #888; margin-bottom: 0.2rem; letter-spacing: 0.04em; }
    .price-value { font-size: 1.2rem; font-weight: 800; color: #1a1a1a; }
    .price-item.active .price-value { color: #4f46e5; }
    .stock-info { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; }
    .qty-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; }
    .qty-display { font-size: 1.1rem; font-weight: 700; min-width: 2rem; text-align: center; }
    .order-total { font-size: 0.92rem; color: #666; margin-bottom: 1.5rem; }
    .order-total strong { font-size: 1.35rem; font-weight: 800; color: #1a1a1a; }
    .detail-desc { color: #666; line-height: 1.75; font-size: 0.9rem; margin-bottom: 1.5rem; border-top: 1px solid #f0f0f0; padding-top: 1.5rem; }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-bottom: 1rem; }

    /* ── Cart ── */
    .cart-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid #f5f5f5; }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-emoji { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #f8f9fa; flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 600; font-size: 0.92rem; margin-bottom: 0.18rem; }
    .cart-item-price { font-size: 0.77rem; color: #aaa; }
    .cart-item-subtotal { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
    .cart-summary { background: #f8f9fa; border-radius: 12px; padding: 1.25rem; margin-top: 1.25rem; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .cart-total-value { font-size: 1.45rem; font-weight: 800; }

    /* ── Order Cards ── */

<body>

  <script type="text/babel">
const { useState, useEffect, useContext, createContext, useRef } = React;

// ── 상수 ──
const CATEGORIES = ['전체', '전자기기', '가구', '소모품'];
const EMOJI_OPTIONS = ['📦','⌨️','🖥️','💻','📷','🖱️','🪑','🗃️','📄','🖨️','🖲️','💾','📱','🔌','💡','🗂️'];
const MIN_QTY = { p001:10, p002:2, p003:5, p004:3, p005:10, p006:2, p007:1, p008:20 };

const TRANSITIONS = {
  paid:      ['shipping', 'cancelled'],
  shipping:  ['delivered'],
  delivered: [],
  cancelled: [],
};
const STATUS_LABEL        = { paid:'결제완료', shipping:'배송중', delivered:'배송완료', cancelled:'취소' };
const STATUS_BADGE        = { paid:'badge-paid', shipping:'badge-shipping', delivered:'badge-delivered', cancelled:'badge-cancelled' };
const STATUS_ACTION_LABEL = { shipping:'배송시작', delivered:'배송완료', cancelled:'취소' };
const PRODUCT_STATUS_LABEL= { active:'판매중', suspended:'판매중지', discontinued:'단종' };
const PRODUCT_STATUS_BADGE= { active:'badge-active', suspended:'badge-suspended', discontinued:'badge-discontinued' };

// ── 시드 데이터 ──
const USERS = [
  { id:'u001', name:'홍길동',              type:'B2C' },
  { id:'u002', name:'(주)예시코퍼레이션', type:'B2B' },
  { id:'u003', name:'관리자',              type:'ADMIN' },
];

const INIT_PRODUCTS = [
  { id:'p001', name:'무선 키보드',    category:'전자기기', status:'active',       price:{b2c:89000,  b2b:72000},  emoji:'⌨️',  description:'2.4GHz 무선 연결, 풀배열, 멤브레인 방식의 사무용 키보드입니다.' },
  { id:'p002', name:'모니터 27"',    category:'전자기기', status:'active',       price:{b2c:320000, b2b:256000}, emoji:'🖥️',  description:'27인치 IPS 패널, 144Hz, QHD 해상도 게이밍 모니터입니다.' },
  { id:'p003', name:'노트북 거치대',  category:'전자기기', status:'active',       price:{b2c:45000,  b2b:36000},  emoji:'💻',  description:'알루미늄 합금 소재, 높이·각도 조절 가능한 접이식 거치대입니다.' },
  { id:'p004', name:'웹캠 HD',       category:'전자기기', status:'active',       price:{b2c:68000,  b2b:54000},  emoji:'📷',  description:'1080p/30fps, 내장 마이크, 플러그앤플레이 USB 웹캠입니다.' },
  { id:'p005', name:'무선 마우스',   category:'전자기기', status:'active',       price:{b2c:35000,  b2b:28000},  emoji:'🖱️',  description:'2.4GHz 무선, 3단계 DPI 조절, 배터리 수명 18개월.' },
  { id:'p006', name:'사무용 의자',   category:'가구',     status:'active',       price:{b2c:280000, b2b:224000}, emoji:'🪑',  description:'요추 지지대, 높이·팔걸이·등받이 각도 조절 가능한 메쉬 의자입니다.' },
  { id:'p007', name:'스탠딩 데스크', category:'가구',     status:'active',       price:{b2c:450000, b2b:360000}, emoji:'🗃️',  description:'전동 높이 조절(68~118cm), 메모리 4단계, 탑재 하중 80kg.' },
  { id:'p008', name:'A4 복사용지',   category:'소모품',   status:'active',       price:{b2c:12000,  b2b:9600},   emoji:'📄',  description:'80g/m² 500매, 레이저·잉크젯 공용, 백색도 163CIE.' },
];

const INIT_INVENTORY = {
  p001:{qty:50}, p002:{qty:3},  p003:{qty:20},
  p004:{qty:8},  p005:{qty:35}, p006:{qty:5},
  p007:{qty:2},  p008:{qty:0},
};

const SEED_ORDERS = [
  { id:'ORD-2604100001', userId:'u001', userType:'B2C', items:[{productId:'p001',name:'무선 키보드',qty:2,unitPrice:89000}],                                                             totalAmount:178000, status:'delivered', createdAt:'2026-04-10T09:00:00.000Z' },
  { id:'ORD-2604120001', userId:'u002', userType:'B2B', items:[{productId:'p002',name:'모니터 27"',qty:1,unitPrice:256000}],                                                            totalAmount:256000, status:'shipping',  createdAt:'2026-04-12T14:30:00.000Z' },
  { id:'ORD-2604140001', userId:'u001', userType:'B2C', items:[{productId:'p005',name:'무선 마우스',qty:3,unitPrice:35000}],                                                            totalAmount:105000, status:'paid',      createdAt:'2026-04-14T08:00:00.000Z' },
  { id:'ORD-2604150001', userId:'u002', userType:'B2B', items:[{productId:'p006',name:'사무용 의자',qty:2,unitPrice:224000},{productId:'p003',name:'노트북 거치대',qty:5,unitPrice:36000}], totalAmount:628000, status:'paid',      createdAt:'2026-04-15T10:00:00.000Z' },
];

// ── 헬퍼 ──
function loadOrInit(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
  catch { return fallback; }
}
function save(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
function getPrice(product, userType) {
  const t = userType.toLowerCase();
  return product.price[t] ?? product.price.b2c;
}
function fmt(n) { return Number(n).toLocaleString('ko-KR') + '원'; }
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function makeOrderId() {
  return `ORD-${Date.now()}-${Math.random().toString(36).slice(2,5).toUpperCase()}`;
}

// ── Store ──
const StoreContext = createContext(null);

function StoreProvider({ children }) {
  const [products,    setProducts]    = useState(() => loadOrInit('cms-products',  INIT_PRODUCTS));
  const [inventory,   setInventory]   = useState(() => loadOrInit('cms-inventory', INIT_INVENTORY));
  const [orders,      setOrders]      = useState(() => loadOrInit('cms-orders',    SEED_ORDERS));
  const [currentUser, setCurrentUser] = useState(() => loadOrInit('cms-user',      USERS[0]));
  const [cartItems,   setCartItems]   = useState(() => loadOrInit('cms-cart',      []));

  useEffect(() => { save('cms-products',  products);  }, [products]);
  useEffect(() => { save('cms-inventory', inventory); }, [inventory]);
  useEffect(() => { save('cms-orders',    orders);    }, [orders]);
  useEffect(() => { save('cms-user',      currentUser); }, [currentUser]);
  useEffect(() => { save('cms-cart',      cartItems); }, [cartItems]);

  function switchUser(user) {
    if (user.type !== currentUser.type) setCartItems([]); // 가격 변동 → 장바구니 초기화
    setCurrentUser(user);
  }

  function restoreInventory(items) {
    setInventory(prev => {
      const next = { ...prev };
      items.forEach(item => {
        next[item.productId] = { qty: (next[item.productId]?.qty ?? 0) + item.qty };
      });
      return next;
    });
  }

  function placeOrder(product, qty) {
    const stock = inventory[product.id]?.qty ?? 0;
    if (stock < qty) throw new Error(`재고 부족: 남은 수량 ${stock}개`);
    setInventory(prev => ({ ...prev, [product.id]: { qty: prev[product.id].qty - qty } }));
    const unitPrice = getPrice(product, currentUser.type);
    const order = {
      id: makeOrderId(),
      userId: currentUser.id,
      userType: currentUser.type,
      items: [{ productId: product.id, name: product.name, qty, unitPrice }],
      totalAmount: unitPrice * qty,
      status: 'paid',
      createdAt: new Date().toISOString(),
    };
    setOrders(prev => [order, ...prev]);
    return order;
  }

  function placeCartOrder() {
    for (const ci of cartItems) {
      const stock = inventory[ci.productId]?.qty ?? 0;
      if (stock < ci.qty) throw new Error(`재고 부족: ${ci.name} (남은 수량 ${stock}개)`);
    }
    setInventory(prev => {
      const next = { ...prev };
      cartItems.forEach(ci => { next[ci.productId] = { qty: next[ci.productId].qty - ci.qty }; });
      return next;
    });
    const order = {
      id: makeOrderId(),
      userId: currentUser.id,
      userType: currentUser.type,
      items: cartItems.map(ci => ({ productId: ci.productId, name: ci.name, qty: ci.qty, unitPrice: ci.unitPrice })),
      totalAmount: cartItems.reduce((s, ci) => s + ci.unitPrice * ci.qty, 0),
      status: 'paid',
      createdAt: new Date().toISOString(),
    };
    setOrders(prev => [order, ...prev]);
    setCartItems([]);
    return order;
  }

  function addToCart(product) {
    const unitPrice = getPrice(product, currentUser.type);
    setCartItems(prev => {
      const existing = prev.find(ci => ci.productId === product.id);
      if (existing) {
        const stock = inventory[product.id]?.qty ?? 0;
        if (existing.qty >= stock) return prev;
        return prev.map(ci => ci.productId === product.id ? { ...ci, qty: ci.qty + 1 } : ci);
      }
      return [...prev, { productId: product.id, name: product.name, qty: 1, unitPrice, emoji: product.emoji }];
    });
  }

  function updateCartQty(productId, delta) {
    setCartItems(prev => prev.map(ci => {
      if (ci.productId !== productId) return ci;
      const stock = inventory[productId]?.qty ?? 0;
      return { ...ci, qty: Math.min(stock, Math.max(1, ci.qty + delta)) };
    }));
  }

  function removeFromCart(productId) {
    setCartItems(prev => prev.filter(ci => ci.productId !== productId));
  }

  function updateOrderStatus(orderId, newStatus) {
    const order = orders.find(o => o.id === orderId);
    if (!order || !TRANSITIONS[order.status].includes(newStatus)) return null;
    if (newStatus === 'cancelled') restoreInventory(order.items);
    setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status: newStatus } : o));
    return newStatus === 'cancelled' ? order.items : null;
  }

  function updateInventory(productId, qty) {
    setInventory(prev => ({ ...prev, [productId]: { qty: Math.max(0, Number(qty)) } }));
  }

  function saveProduct(product) {
    if (product.id) {
      setProducts(prev => prev.map(p => p.id === product.id ? product : p));
    } else {
      const np = { ...product, id: `p${Date.now()}` };
      setProducts(prev => [...prev, np]);
      setInventory(prev => ({ ...prev, [np.id]: { qty: 0 } }));
    }
  }

  function deleteProduct(productId) {
    setProducts(prev => prev.filter(p => p.id !== productId));
    setInventory(prev => { const n = { ...prev }; delete n[productId]; return n; });
    setCartItems(prev => prev.filter(ci => ci.productId !== productId));
  }

  return (
    <StoreContext.Provider value={{
      products, inventory, orders, currentUser, setCurrentUser: switchUser,
      cartItems, addToCart, updateCartQty, removeFromCart, placeCartOrder,
      placeOrder, updateOrderStatus, updateInventory, saveProduct, deleteProduct,
    }}>
      {children}
    </StoreContext.Provider>
  );
}

function useStore() { return useContext(StoreContext); }

function useHash() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const h = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  return hash;
}
function navigate(path) { window.location.hash = '#' + path; }

  const totalOrders   = orders.length;

  const recentOrders  = [...orders].sort((a,b) => b.createdAt - a.createdAt).slice(0, 6);

  return (

// ── ProductCard ──
function ProductCard({ product }) {
  const { inventory, currentUser, addToCart, cartItems } = useStore();
  const [added, setAdded] = useState(false);
  const stock        = inventory[product.id]?.qty ?? 0;
  const isOutOfStock = stock === 0;
  const isUnavailable = isOutOfStock || product.status !== 'active';
  const inCart       = cartItems.find(ci => ci.productId === product.id);
  const stockPct     = Math.min(100, (stock / 50) * 100);
  const stockColor   = stock === 0 ? '#dc2626' : stock <= 5 ? '#d97706' : '#22c55e';
  const catClass     = `cat-${product.category}`;

  function BadgeEl() {
    if (isOutOfStock)                      return <span className="badge badge-sold-out">품절</span>;
    if (product.status === 'suspended')    return <span className="badge badge-suspended">판매중지</span>;
    if (product.status === 'discontinued') return <span className="badge badge-discontinued">단종</span>;
    return null;
  }

  function handleAddToCart(e) {
    e.stopPropagation();
    addToCart(product);
    setAdded(true);
    setTimeout(() => setAdded(false), 1400);
  }

  return (
    <div className={`product-card${isUnavailable ? ' unavailable' : ''}`}
         onClick={() => !isUnavailable && navigate(`/product/${product.id}`)}>
      <div className="card-badge-wrap"><BadgeEl /></div>
      <div className={`product-emoji-box ${catClass}`}>{product.emoji}</div>
      <div className="product-name">{product.name}</div>
      <div className="product-category">{product.category}</div>
      <div className="product-price">{fmt(getPrice(product, currentUser.type))}</div>
      <div className="stock-bar-wrap">
        <div className="stock-bar-bg">
          <div className="stock-bar-fill" style={{width:`${stockPct}%`, background: stockColor}} />
        </div>
      </div>
      <div className={`product-stock${stock === 0 ? ' zero' : stock <= 5 ? ' low' : ''}`}>
        {stock === 0 ? '재고 없음' : stock <= 5 ? `재고 ${stock}개 (품절 임박)` : `재고 ${stock}개`}
      </div>
      <div className="card-actions">
        <button className="btn btn-secondary btn-sm" disabled={isUnavailable} style={{flex:1}}
                onClick={e => { e.stopPropagation(); !isUnavailable && navigate(`/product/${product.id}`); }}>
          상세
        </button>
        <button className="btn btn-primary btn-sm" disabled={isUnavailable} style={{flex:2}}
                onClick={handleAddToCart}>
          {added ? '✓ 담김' : inCart ? `🛒 ${inCart.qty}개` : '장바구니'}
        </button>
      </div>
    </div>
  );
}

// ── ProductDetailPage ──
function ProductDetailPage({ productId }) {
  const { products, inventory, currentUser, placeOrder, addToCart } = useStore();
  const [qty, setQty]     = useState(1);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);

  const product = products.find(p => p.id === productId);
  if (!product) return (
    <div className="sv-body">
      <Breadcrumb current="상품 상세" />
      <p>상품을 찾을 수 없습니다.</p>
    </div>
  );

  const stock     = inventory[product.id]?.qty ?? 0;
  const price     = getPrice(product, currentUser.type);
  const isOrderable = product.status === 'active' && stock > 0;

  function handleOrder() {
    setError('');
    try {
      placeOrder(product, qty);
      setToast({ message: `✅ 주문 완료! ${product.name} × ${qty}`, type: 'success' });
      setTimeout(() => navigate('/orders'), 1500);
    } catch (e) { setError(e.message); }
  }

  function handleAddToCart() {
    for (let i = 0; i < qty; i++) addToCart(product);
    setToast({ message: `🛒 장바구니에 ${qty}개 담았습니다`, type: 'success' });
  }

  return (
    <div className="sv-body">
      <Breadcrumb current="상품 상세" />
      <div className="detail-wrap">
        <span className="detail-emoji">{product.emoji}</span>
        <div className="detail-name">{product.name}</div>
        <div className="detail-category">
          {product.category} ·{' '}
          <span className={`badge ${PRODUCT_STATUS_BADGE[product.status]}`}>
            {PRODUCT_STATUS_LABEL[product.status]}
          </span>
        </div>

        <div className="price-row">
          {['B2C','B2B'].map(type => (
            <div key={type} className={`price-item${currentUser.type === type ? ' active' : ''}`}>
              <div className="price-label">{type} {type === 'B2C' ? '일반가' : '기업가'}</div>
              <div className="price-value">{fmt(product.price[type.toLowerCase()])}</div>
            </div>
          ))}
        </div>

        <div className="stock-info">
          현재 재고: <strong>{stock}개</strong>
          {stock <= 5 && stock > 0 && <span style={{color:'#d97706',marginLeft:'0.5rem'}}>⚠ 재고 부족</span>}
          {stock === 0 && <span style={{color:'#dc2626',marginLeft:'0.5rem'}}>품절</span>}
        </div>

        <div className="detail-desc">{product.description}</div>

        {isOrderable ? (
          <>
            <div className="qty-row">
              <button className="btn-qty" onClick={() => setQty(q => Math.max(1, q-1))} disabled={qty<=1}>−</button>
              <span className="qty-display">{qty}</span>
              <button className="btn-qty" onClick={() => setQty(q => Math.min(stock, q+1))} disabled={qty>=stock}>+</button>
              <span style={{fontSize:'0.78rem',color:'#aaa'}}>최대 {stock}개</span>
            </div>
            <div className="order-total">
              합계: <strong>{fmt(price * qty)}</strong>
              <span style={{fontSize:'0.76rem',color:'#aaa',marginLeft:'0.5rem'}}>({currentUser.type} 가격 기준)</span>
            </div>
            {error && <div className="error-msg">⚠ {error}</div>}

              <button className="btn btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={handleAddToCart}>
                🛒 장바구니
              </button>
              <button className="btn btn-primary" style={{flex:1,justifyContent:'center',padding:'0.8rem'}}
                      onClick={handleOrder}>
                바로 주문
              </button>
            </div>
          </>
        ) : (
          <div className="error-msg">
            {stock === 0 ? '재고가 없어 주문할 수 없습니다.' : '현재 주문할 수 없는 상품입니다.'}
          </div>
        )}
      </div>
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

// ── AdminOrdersPage ──
function AdminOrdersPage({ initialFilter = '전체' }) {
  const { orders, updateOrderStatus } = useStore();
  const [statusFilter, setStatusFilter] = useState(initialFilter);
  const [search, setSearch] = useState('');
  const [toast, setToast] = useState(null);
  const STATUS_FILTERS = ['전체', 'paid', 'shipping', 'delivered', 'cancelled'];

  const filtered = orders
    .filter(o => statusFilter === '전체' || o.status === statusFilter)
    .filter(o => {
      if (!search.trim()) return true;
      const q = search.toLowerCase();
      return o.id.toLowerCase().includes(q)
        || o.items.some(i => i.name.toLowerCase().includes(q))
        || (USERS.find(u => u.id === o.userId)?.name ?? '').toLowerCase().includes(q);
    });

  function handleStatus(orderId, newStatus) {
    const cancelledItems = updateOrderStatus(orderId, newStatus);
    if (newStatus === 'cancelled' && cancelledItems) {
      const names = cancelledItems.map(i => `${i.name} ×${i.qty}`).join(', ');
      setToast({ message: `취소 완료 — ${names} 재고 복구됨`, type: 'success' });
    } else if (newStatus === 'shipping') {
      setToast({ message: '배송이 시작되었습니다 🚚', type: 'success' });
    } else if (newStatus === 'delivered') {
      setToast({ message: '배송 완료 처리되었습니다 ✅', type: 'success' });
    }
  }

  const pageName = initialFilter === 'shipping' ? '🚚 배송관리' : '🛒 주문관리';

  return (
    <div className="sv-body">
      <Breadcrumb current={pageName} />
      <div className="sv-header">
        <div className="sv-title">{pageName}</div>
        <div className="sv-actions">
          <div className="filter-bar" style={{marginBottom:0}}>
            {STATUS_FILTERS.map(f => (
              <button key={f} className={`filter-btn${statusFilter === f ? ' active' : ''}`}
                      onClick={() => setStatusFilter(f)}>
                {f === '전체' ? '전체' : STATUS_LABEL[f]}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="sv-stat-row" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        {STATUS_FILTERS.slice(1).map(s => (
          <div key={s} className="sv-stat">
            <div className="sv-stat-label">{STATUS_LABEL[s]}</div>
            <div className={`sv-stat-val ${s==='paid'?'warn':s==='shipping'?'accent':s==='delivered'?'ok':'danger'}`}>
              {orders.filter(o=>o.status===s).length}
            </div>
          </div>
        ))}
      </div>
      <div className="sv-card">
        <div className="sv-card-header">
          <div className="sv-card-title">주문 목록 ({filtered.length}건)</div>
          <div className="sv-search-wrap">
            <span className="sv-search-icon">🔍</span>
            <input className="sv-search" placeholder="주문번호 · 상품 · 고객"
                   value={search} onChange={e => setSearch(e.target.value)} />
          </div>
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>주문번호</th><th>고객</th><th>유형</th>
              <th>상품</th><th style={{textAlign:'right'}}>금액</th>
              <th>일시</th><th>상태</th><th>액션</th>
            </tr></thead>
            <tbody>
              {filtered.map(order => (
                <tr key={order.id}>
                  <td style={{fontFamily:'monospace',fontSize:'0.73rem',color:'#bbb'}}>{order.id}</td>
                  <td style={{fontWeight:500}}>{USERS.find(u=>u.id===order.userId)?.name ?? order.userId}</td>
                  <td><span className={`badge ${order.userType==='B2B'?'badge-b2b':'badge-active'}`}>{order.userType}</span></td>
                  <td style={{color:'var(--text-2)'}}>{order.items.map(i=>`${i.name} ×${i.qty}`).join(', ')}</td>
                  <td style={{fontWeight:800,textAlign:'right'}}>{fmt(order.totalAmount)}</td>
                  <td style={{color:'var(--text-3)',fontSize:'0.77rem',whiteSpace:'nowrap'}}>{fmtDate(order.createdAt)}</td>
                  <td><span className={`badge ${STATUS_BADGE[order.status]}`}>{STATUS_LABEL[order.status]}</span></td>
                  <td>
                    <div className="action-btns">
                      {TRANSITIONS[order.status].length > 0
                        ? TRANSITIONS[order.status].map(next => (
                            <button key={next}
                                    className={`btn btn-sm ${next==='cancelled'?'btn-danger':'btn-secondary'}`}
                                    onClick={() => handleStatus(order.id, next)}>
                              {STATUS_ACTION_LABEL[next]}
                            </button>
                          ))
                        : <span className="action-done">처리 완료</span>
                      }
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {filtered.length === 0 && (
          <div className="empty-state" style={{padding:'2rem'}}>
            <div>조건에 맞는 주문이 없습니다.</div>
          </div>
        )}
      </div>
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

          <div className="sv-stat-label">판매 중</div>
          <div className="sv-stat-val ok">{products.filter(p=>p.status==='active').length}</div>
        </div>
        <div className="sv-stat">
          <div className="sv-stat-label">중단·단종</div>
          <div className="sv-stat-val warn">{products.filter(p=>p.status!=='active').length}</div>
        </div>
      </div>
      <div className="sv-card">
        <div className="sv-card-header">
          <div className="sv-card-title">상품 목록</div>
        </div>
        <div style={{padding:'1rem'}}>
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>상품</th><th>카테고리</th><th>B2C</th><th>B2B</th><th>상태</th><th>수명주기</th><th>액션</th>
              </tr></thead>
              <tbody>
                {products.map(p => (
                  <tr key={p.id}>
                    <td style={{fontWeight:600}}>{p.emoji} {p.name}</td>
                    <td>{p.category}</td>
                    <td>{fmt(p.price.b2c)}</td>
                    <td>{fmt(p.price.b2b)}</td>
                    <td><span className={`badge ${PRODUCT_STATUS_BADGE[p.status]}`}>{PRODUCT_STATUS_LABEL[p.status]}</span></td>
                    <td>
                      <div className="plm-pipeline">
                        {['기획','개발','판매','종료'].map((stage, i) => (
                          <div key={i} className="plm-bar"
                               style={{background: i <= plmStageIdx(p.status) ? '#6366f1' : '#e5e7eb'}}
                               title={stage} />
                        ))}
                        <span className="plm-label">{PRODUCT_STATUS_LABEL[p.status]}</span>
                      </div>
                    </td>
                    <td>
                      <div className="action-btns">
                        <button className="btn btn-sm btn-secondary"
                                onClick={() => setModal({ ...p, price:{b2c:p.price.b2c, b2b:p.price.b2b} })}>수정</button>
                        <button className="btn btn-sm btn-danger"
                                onClick={() => setConfirmDel({ id: p.id, name: p.name })}>삭제</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {modal && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">{modal.id ? '상품 수정' : '상품 추가'}</div>
            <div className="form-row-2">
              <div className="form-row" style={{marginBottom:0}}>
                <label className="form-label">이모지</label>
                <select className="form-select" value={modal.emoji} onChange={e => setField('emoji', e.target.value)}>
                  {EMOJI_OPTIONS.map(em => <option key={em} value={em}>{em}</option>)}
                </select>
              </div>
              <div className="form-row" style={{marginBottom:0}}>
                <label className="form-label">상품명 *</label>
                <input className="form-input" value={modal.name} onChange={e => setField('name', e.target.value)} placeholder="상품명" />
              </div>
            </div>
            <div className="form-row" style={{marginTop:'1rem'}}>
              <label className="form-label">설명</label>
              <input className="form-input" value={modal.description} onChange={e => setField('description', e.target.value)} placeholder="상품 설명" />
            </div>
            <div className="form-row-2" style={{marginTop:'0.75rem'}}>
              <div>
                <label className="form-label">카테고리</label>
                <select className="form-select" value={modal.category} onChange={e => setField('category', e.target.value)}>
                  {['전자기기','가구','소모품'].map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label className="form-label">수명주기 상태</label>
                <select className="form-select" value={modal.status} onChange={e => setField('status', e.target.value)}>
                  <option value="active">판매중</option>
                  <option value="suspended">판매중지</option>
                  <option value="discontinued">단종</option>
                </select>
              </div>
            </div>
            <div className="form-row-2" style={{marginTop:'0.75rem'}}>
              <div>
                <label className="form-label">B2C 가격 (원) *</label>
                <input className="form-input" type="number" value={modal.price.b2c} onChange={e => setPriceField('b2c', e.target.value)} placeholder="89000" />
              </div>
              <div>
                <label className="form-label">B2B 가격 (원) *</label>
                <input className="form-input" type="number" value={modal.price.b2b} onChange={e => setPriceField('b2b', e.target.value)} placeholder="72000" />
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setModal(null)}>취소</button>
              <button className="btn btn-primary" onClick={handleSave}>저장</button>
            </div>
          </div>
        </div>
      )}

      {confirmDel && (
        <ConfirmModal
          title="상품 삭제"
          confirmLabel="삭제"
          onConfirm={() => { deleteProduct(confirmDel.id); setConfirmDel(null); }}
          onCancel={() => setConfirmDel(null)}
        >
          <span className="confirm-name">"{confirmDel.name}"</span>을(를) 삭제하면<br />복구할 수 없습니다.
        </ConfirmModal>
      )}
    </div>
  );
}

// ── AdminInventoryPage ──
function AdminInventoryPage({ initialTab = '재고현황' }) {
  const { products, inventory, updateInventory } = useStore();
  const [activeTab, setActiveTab] = useState(initialTab);
  const [localQty, setLocalQty] = useState(() => {
    const init = {};
    Object.keys(inventory).forEach(id => { init[id] = inventory[id].qty; });
    return init;
  });
  const [toast, setToast] = useState(null);

  useEffect(() => {
    setLocalQty(prev => {
      const next = { ...prev };
      Object.keys(inventory).forEach(id => {
        if (next[id] === undefined) next[id] = inventory[id].qty;
      });
      return next;
    });
  }, [inventory]);

  function adjust(productId, delta) {
    setLocalQty(prev => ({ ...prev, [productId]: Math.max(0, (prev[productId] ?? 0) + delta) }));
  }

  function handleSave(productId) {
    const newQty = localQty[productId] ?? 0;
    updateInventory(productId, newQty);
    const p = products.find(p => p.id === productId);
    setToast({ message: `✅ ${p?.name} 재고 업데이트 → ${newQty}개`, type: 'success' });
  }

  const alertCount = products.filter(p => (inventory[p.id]?.qty ?? 0) < (MIN_QTY[p.id] ?? 5)).length;
  const TABS = ['재고현황', '입고', '출고'];
  const tabIcons = { '재고현황': '🏭', '입고': '📥', '출고': '📤' };
  const pageName = `${tabIcons[activeTab]} ${activeTab === '재고현황' ? '재고관리' : activeTab + '관리'}`;

  return (
    <div className="sv-body">
      <Breadcrumb current={pageName} />
      <div className="sv-header">
        <div className="sv-title">{pageName}</div>
        {alertCount > 0 && (
          <span className="badge badge-sold-out">⚠ {alertCount}개 재고 경보</span>
        )}
      </div>
      <div className="sv-stat-row" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="sv-stat">
          <div className="sv-stat-label">전체 품목</div>
          <div className="sv-stat-val accent">{products.length}</div>
        </div>
        <div className="sv-stat">
          <div className="sv-stat-label">재고 경보</div>
          <div className={`sv-stat-val ${alertCount > 0 ? 'danger' : 'ok'}`}>{alertCount}</div>
        </div>
        <div className="sv-stat">
          <div className="sv-stat-label">품절</div>
          <div className={`sv-stat-val ${products.filter(p=>(inventory[p.id]?.qty??0)===0).length > 0 ? 'danger' : 'ok'}`}>
            {products.filter(p => (inventory[p.id]?.qty ?? 0) === 0).length}
          </div>
        </div>
      </div>
      <div className="sv-card">
        <div className="sv-tabs">
          {TABS.map(tab => (
            <div key={tab} className={`sv-tab${activeTab === tab ? ' active' : ''}`}
                 onClick={() => setActiveTab(tab)}>
              {tabIcons[tab]} {tab}
            </div>
          ))}
        </div>
        {activeTab === '재고현황' && (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>상품</th><th>카테고리</th><th>현재 재고</th><th>최소 기준</th><th>수량 수정</th><th></th>
              </tr></thead>
              <tbody>
                {products.map(p => {
                  const current = inventory[p.id]?.qty ?? 0;
                  const minQ    = MIN_QTY[p.id] ?? 5;
                  const editQty = localQty[p.id] ?? 0;
                  const isDirty = editQty !== current;
                  const isAlert = current < minQ;
                  return (
                    <tr key={p.id} className={current === 0 ? 'row-zero' : ''}>
                      <td style={{fontWeight:600}}>
                        {p.emoji} {p.name}
                        {isAlert && <span className="alert-dot" title="재고 기준치 미달" />}
                      </td>
                      <td style={{color:'var(--text-2)'}}>{p.category}</td>
                      <td style={{fontWeight:700,color:current===0?'#dc2626':isAlert?'#d97706':'var(--text)'}}>
                        {current}개
                        {current===0 && <span className="badge badge-sold-out" style={{marginLeft:'0.5rem'}}>품절</span>}
                      </td>
                      <td style={{color:'var(--text-3)',fontSize:'0.81rem'}}>{minQ}개</td>
                      <td>
                        <div className="inv-qty-wrap">
                          <button className="btn-qty" onClick={() => adjust(p.id, -1)} disabled={editQty<=0}>−</button>
                          <input className="inv-qty-input" type="number" min="0" value={editQty}
                                 onChange={e => setLocalQty(prev=>({...prev,[p.id]:Number(e.target.value)}))} />
                          <button className="btn-qty" onClick={() => adjust(p.id, 1)}>+</button>
                        </div>
                      </td>
                      <td>
                        <button className={`btn btn-sm ${isDirty?'btn-primary':'btn-secondary'}`}
                                disabled={!isDirty} onClick={() => handleSave(p.id)}>저장</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
        {activeTab === '입고' && (
          <div style={{padding:'2rem',textAlign:'center',color:'var(--text-3)'}}>
            <div style={{fontSize:'2rem',marginBottom:'0.5rem'}}>📥</div>
            <div style={{fontWeight:700,color:'var(--text-2)'}}>입고 내역</div>
            <div style={{fontSize:'0.8rem',marginTop:'0.25rem'}}>재고 수량을 조정하면 입고 처리됩니다. 재고현황 탭에서 수정하세요.</div>
            <button className="btn btn-primary" style={{marginTop:'1rem'}} onClick={() => setActiveTab('재고현황')}>
              재고현황 탭으로 이동
            </button>
          </div>
        )}
        {activeTab === '출고' && (
          <div style={{padding:'2rem',textAlign:'center',color:'var(--text-3)'}}>
            <div style={{fontSize:'2rem',marginBottom:'0.5rem'}}>📤</div>
            <div style={{fontWeight:700,color:'var(--text-2)'}}>출고 내역</div>
            <div style={{fontSize:'0.8rem',marginTop:'0.25rem'}}>출고는 주문 배송 처리 시 자동으로 반영됩니다. 주문관리에서 확인하세요.</div>
            <button className="btn btn-primary" style={{marginTop:'1rem'}} onClick={() => navigate('/admin/orders/shipping')}>
              배송관리로 이동
            </button>
          </div>
        )}
      </div>
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

// ── TopNav ──
function TopNav({ currentPath }) {
  const { currentUser, setCurrentUser, cartItems, inventory, products } = useStore();
  const [adminOpen, setAdminOpen] = useState(false);
  const dropRef = useRef(null);
  const isAdmin = currentPath.startsWith('/admin');
  const cartCount = cartItems.reduce((s, ci) => s + ci.qty, 0);
  const alertCount = products.filter(p => (inventory[p.id]?.qty ?? 0) < (MIN_QTY[p.id] ?? 5)).length;

  useEffect(() => {
    function handler(e) { if (dropRef.current && !dropRef.current.contains(e.target)) setAdminOpen(false); }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  return (
    <nav className="topnav">
      <span className="topnav-logo" onClick={() => navigate('/')}>🛒 CommerceLab</span>

      <span className={`topnav-link${currentPath === '/dashboard' ? ' active' : ''}`}
            onClick={() => navigate('/dashboard')}>대시보드</span>

      <span className={`topnav-link${currentPath === '/shop' ? ' active' : ''}`}
            onClick={() => navigate('/shop')}>상품목록</span>

      <span className={`topnav-link${currentPath === '/orders' ? ' active' : ''}`}
            onClick={() => navigate('/orders')}>내 주문</span>

      <div className="nav-dropdown" ref={dropRef}>
        <span className={`topnav-link${isAdmin ? ' active' : ''}`}
              onClick={() => setAdminOpen(v => !v)}>
          관리자 ▾{alertCount > 0 && <span className="nav-alert-dot" />}
        </span>
        <div className={`nav-dropdown-menu${adminOpen ? ' open' : ''}`}>
          <span className="nav-dropdown-item" onClick={() => { navigate('/admin/orders');    setAdminOpen(false); }}>📋 주문 관리</span>
          <span className="nav-dropdown-item" onClick={() => { navigate('/admin/products');  setAdminOpen(false); }}>🏷️ 상품 관리</span>
          <span className="nav-dropdown-item" onClick={() => { navigate('/admin/inventory'); setAdminOpen(false); }}>
            📦 재고 관리{alertCount > 0 && <span className="nav-alert-dot" />}
          </span>
        </div>
      </div>

      {cartCount > 0 && (
        <span className="cart-nav-btn" onClick={() => navigate('/cart')}>
          🛒<span className="cart-nav-badge">{cartCount > 9 ? '9+' : cartCount}</span>
        </span>
      )}

      <div className="user-toggle">
        {USERS.map(u => (
          <span key={u.type}
                className={`user-toggle-btn${currentUser.type === u.type ? ' active' : ''}`}
                onClick={() => setCurrentUser(u)}>{u.type}</span>
        ))}
      </div>
    </nav>
  );
}

// ── App 라우터 ──
function App() {
  const hash = useHash();
  const path = hash.replace(/^#/, '') || '/';
  const productMatch = path.match(/^\/product\/(.+)$/);
  const productId = productMatch ? productMatch[1] : null;

  function renderPage() {
    if (productId)                              return <ProductDetailPage productId={productId} />;
    if (path === '/shop')                       return <ShopPage />;
    if (path === '/cart')                       return <CartPage />;
    if (path === '/orders')                     return <MyOrdersPage />;
    if (path === '/dashboard')                  return <DashboardPage />;
    if (path === '/admin/orders')               return <AdminOrdersPage initialFilter="전체" />;
    if (path === '/admin/orders/shipping')      return <AdminOrdersPage initialFilter="shipping" />;
    if (path === '/admin/products')             return <AdminProductsPage />;
    if (path === '/admin/inventory')            return <AdminInventoryPage initialTab="재고현황" />;
    if (path === '/admin/inventory/inbound')    return <AdminInventoryPage initialTab="입고" />;
    if (path === '/admin/inventory/outbound')   return <AdminInventoryPage initialTab="출고" />;
    return <HomeLauncherPage />;
  }

  return <div><TopNav currentPath={path} />{renderPage()}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <StoreProvider><App /></StoreProvider>
);
  </script>
<script>
(function(){
    var s=document.createElement('style');
    s.textContent='#pg-ov{position:fixed;inset:0;z-index:9999;background:var(--bg,#f8fafc);opacity:0;pointer-events:none;transition:opacity .28s cubic-bezier(.4,0,.2,1)}#pg-ov.on{opacity:1;pointer-events:all}';
    document.head.appendChild(s);
    var ov=document.createElement('div');ov.id='pg-ov';document.body.appendChild(ov);
    var nav=document.querySelector('.topnav');
    if(nav) nav.addEventListener('click',function(e){
        var a=e.target.closest('a[href]');
        if(!a||a.target==='_blank') return;
        var h=a.getAttribute('href');
        if(!h||h.startsWith('http')) return;
        e.preventDefault();
        ov.classList.add('on');
        setTimeout(function(){window.location.href=h;},280);
    });
    window.addEventListener('pageshow',function(e){
        if(e.persisted){ov.style.transition='none';ov.classList.remove('on');ov.offsetHeight;ov.style.transition='';}
    });
})();
</script>
