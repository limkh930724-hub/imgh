<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임광호 — Java Backend Developer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍💻</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── Design Tokens ── */
        :root {
            --bg:       #ffffff;
            --bg-2:     #f4f4f5;
            --text:     #111827;
            --text-2:   #6b7280;
            --accent:   #16a34a;
            --accent-2: rgba(22,163,74,0.12);
            --border:   #e5e7eb;
            --card-bg:  #f9fafb;
            --shadow:   0 4px 24px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg:       #0f1117;
            --bg-2:     #1a1d27;
            --text:     #f1f5f9;
            --text-2:   #94a3b8;
            --accent:   #4ade80;
            --accent-2: rgba(74,222,128,0.12);
            --border:   #2d3148;
            --card-bg:  #1a1d27;
            --shadow:   0 4px 24px rgba(0,0,0,0.3);
        }

        /* ── Base ── */
        html {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        /* ── Scroll Sections ── */
        .section {
            scroll-snap-align: start;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
        }
        .section--career {
            align-items: flex-start;
            padding-top: 5rem;
            padding-bottom: 5rem;
        }
        .section__inner {
            width: 100%;
            max-width: 900px;
        }

        /* ── Fixed Theme Toggle ── */
        .theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            z-index: 1000;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        .theme-toggle:hover { background: var(--bg-2); }

        /* ── Side Dot Nav ── */
        .dot-nav {
            position: fixed;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dot-nav__dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border);
            border: none;
            cursor: pointer;
            padding: 0;
            transition: background 0.2s, transform 0.2s;
        }
        .dot-nav__dot.active {
            background: var(--accent);
            transform: scale(1.35);
        }

        /* ── Section Label ── */
        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* ── Hero ── */
        .hero-content { max-width: 680px; }
        .hero-eyebrow {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--accent);
            margin-bottom: 1.5rem;
        }
        .hero-eyebrow::before {
            content: '';
            display: inline-block; width: 24px; height: 2px;
            background: var(--accent);
        }
        .hero-name {
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .hero-title {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }
        .hero-tagline {
            font-size: 1rem;
            line-height: 1.75;
            color: var(--text-2);
            max-width: 520px;
            margin-bottom: 2.5rem;
        }
        .hero-ctas {
            display: flex; gap: 0.75rem; flex-wrap: wrap;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.65rem 1.4rem;
            border-radius: 8px;
            font-family: inherit; font-size: 0.875rem; font-weight: 700;
            cursor: pointer; text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .btn--primary {
            background: var(--accent);
            color: #fff;
            border: none;
        }
        [data-theme="dark"] .btn--primary { color: #0f1117; }
        .btn--outline {
            background: transparent;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn--outline:hover { border-color: var(--accent); color: var(--accent); }
        .hero-scroll {
            position: absolute;
            bottom: 2rem; left: 50%; transform: translateX(-50%);
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--text-2);
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
        }
        .hero-scroll::after {
            content: '';
            display: block; width: 1px; height: 40px;
            background: linear-gradient(to bottom, var(--text-2), transparent);
            animation: scrollLine 1.6s ease-in-out infinite;
        }
        @keyframes scrollLine {
            0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
            50% { opacity: 1; transform: scaleY(1); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .dot-nav { display: none; }
            .section { padding: 3rem 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeBtn" title="테마 전환">🌙</button>

    <!-- Side Dot Nav -->
    <nav class="dot-nav" id="dotNav" aria-label="섹션 네비게이션">
        <button class="dot-nav__dot active" data-target="hero" title="Hero"></button>
        <button class="dot-nav__dot" data-target="about" title="About"></button>
        <button class="dot-nav__dot" data-target="career" title="Career"></button>
        <button class="dot-nav__dot" data-target="skills" title="Skills"></button>
        <button class="dot-nav__dot" data-target="projects" title="Projects"></button>
        <button class="dot-nav__dot" data-target="contact" title="Contact"></button>
    </nav>

    <!-- 1. Hero -->
    <section class="section" id="hero">
        <div class="section__inner">
            <div class="hero-content">

                <h1 class="hero-name">임광호</h1>
                <p class="hero-title">Java Backend Developer</p>
                <p class="hero-tagline">
                    공공 재난·안전 시스템 6년,<br>
                    운영(SM)부터 고도화(SI)까지 전 과정을 경험한 백엔드 개발자입니다.
                </p>
                <div class="hero-ctas">
                    <a class="btn btn--primary" href="https://github.com/limkh930724-hub" target="_blank" rel="noopener">GitHub ↗</a>
                    <a class="btn btn--outline" href="#contact">Contact</a>
                </div>
            </div>
            <div class="hero-scroll" aria-hidden="true">scroll</div>
        </div>
    </section>

    <!-- 2. About -->
    <section class="section" id="about">

        </div>
    </section>

    <!-- 3. Career -->
    <section class="section section--career" id="career">
        <div class="section__inner">

        </div>
    </section>

    <!-- 4. Skills -->
    <section class="section" id="skills">
        <div class="section__inner">
            <!-- Task 5 -->

    </section>

    <!-- 5. Projects -->
    <section class="section" id="projects">
        <div class="section__inner">
            <!-- Task 6 -->

    </section>

    <!-- 6. Contact -->
    <section class="section" id="contact">
        <div class="section__inner">

    </section>

    <script>

</body>
</html>
