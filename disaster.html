<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재난 대응 시뮬레이터</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:         #0a0f1e;
            --surface:    #0d1b2a;
            --surface-2:  #112240;
            --border:     #1e3a5f;
            --accent:     #ef4444;
            --accent-2:   #f97316;
            --text:       #e2e8f0;
            --text-2:     #94a3b8;
            --shelter:    #22d3ee;
            --recommend:  #a855f7;
            --risk-3:     #ef4444;
            --risk-2:     #f97316;
            --risk-1:     #eab308;
        }

        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

        /* ── 헤더 ── */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            height: 56px; padding: 0 1.5rem;
            display: flex; align-items: center; gap: 1rem;
            background: rgba(13,27,42,0.92);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .header-logo {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.9rem; font-weight: 800; letter-spacing: -0.02em;
            color: var(--text); text-decoration: none; margin-right: auto;
        }
        .header-logo span { color: var(--accent); }
        .header-back {
            font-size: 0.75rem; color: var(--text-2); text-decoration: none;
            padding: 0.3rem 0.7rem; border: 1px solid var(--border); border-radius: 6px;
            transition: color 0.15s, border-color 0.15s;
        }
        .header-back:hover { color: var(--text); border-color: var(--text-2); }
        .disaster-tabs { display: flex; gap: 0.4rem; }
        .disaster-tab {
            padding: 0.35rem 0.9rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
            border: 1px solid var(--border); background: transparent; color: var(--text-2);
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .disaster-tab:hover { color: var(--text); border-color: var(--text-2); }
        .disaster-tab.active { color: #fff; border-color: transparent; }

        /* ── 지도 ── */
        #map {
            position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }
        .leaflet-tile { filter: brightness(0.45) saturate(0.6) hue-rotate(200deg); }

        /* ── 플로팅 컨트롤 ── */
        .float-ctrl {
            position: fixed; bottom: 80px; left: 1.5rem; z-index: 500;
            background: rgba(13,27,42,0.95);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 1rem 1.2rem; width: 220px;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .float-ctrl-title {
            font-size: 0.7rem; font-weight: 700; color: var(--text-2);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem;
        }
        .location-status {
            font-size: 0.78rem; color: var(--text-2); margin-bottom: 0.75rem;
            min-height: 1.2em;
        }
        .location-status.set { color: var(--shelter); }
        .ctrl-btn-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
        .ctrl-btn {
            flex: 1; padding: 0.45rem 0; border-radius: 8px; font-size: 0.74rem; font-weight: 600;
            border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
            cursor: pointer; transition: background 0.15s;
        }
        .ctrl-btn:hover { background: #1a3050; }
        .run-btn {
            width: 100%; padding: 0.6rem; border-radius: 8px; font-size: 0.82rem; font-weight: 700;
            border: none; background: var(--accent); color: #fff;
            cursor: pointer; transition: background 0.15s, opacity 0.15s;
        }
        .run-btn:hover { background: #dc2626; }
        .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── 우측 슬라이드 패널 ── */
        .result-panel {
            position: fixed; top: 56px; right: 0; bottom: 0; z-index: 600;
            width: 340px; background: rgba(10,15,30,0.97);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .result-panel.open { transform: translateX(0); }
        .panel-header {
            padding: 1rem 1.2rem 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0;
        }
        .panel-title { font-size: 0.88rem; font-weight: 700; flex: 1; }
        .panel-sub { font-size: 0.72rem; color: var(--text-2); }
        .panel-close {
            width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-2); cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .panel-close:hover { background: var(--surface-2); color: var(--text); }
        .panel-body { overflow-y: auto; padding: 0.75rem; flex: 1; }

        /* ── 추천 카드 ── */
        .rec-card {
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 0.65rem;
            cursor: pointer; transition: border-color 0.15s, background 0.15s;
        }
        .rec-card:hover { border-color: var(--recommend); background: #1a1240; }
        .rec-card.selected {
            border-color: var(--recommend); background: #1a1240;
            box-shadow: 0 0 0 1px var(--recommend);
        }
        .rec-card.selected .rec-rank { transform: scale(1.15); }
        .rec-card.selected .score-bar-fill { background: #c084fc; }
        .rec-card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
        .rec-rank {
            width: 22px; height: 22px; border-radius: 50%; font-size: 0.7rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            background: var(--recommend); color: #fff; flex-shrink: 0;
        }
        .rec-name { font-size: 0.84rem; font-weight: 700; flex: 1; }
        .rec-score { font-size: 0.8rem; font-weight: 800; color: var(--recommend); }
        .score-rows { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.55rem; }
        .score-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; }
        .score-label { width: 36px; color: var(--text-2); flex-shrink: 0; }
        .score-bar-bg {
            flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden;
        }
        .score-bar-fill { height: 100%; border-radius: 3px; background: var(--recommend); }
        .score-val { width: 54px; text-align: right; color: var(--text-2); flex-shrink: 0; }
        .rec-reason {
            font-size: 0.7rem; color: var(--text-2); margin-bottom: 0.55rem;
            line-height: 1.5;
        }
        .rec-goto {
            width: 100%; padding: 0.38rem; border-radius: 6px; font-size: 0.72rem; font-weight: 600;
            border: 1px solid var(--border); background: transparent; color: var(--text-2);
            cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .rec-goto:hover { background: var(--surface); color: var(--text); }

        /* ── 범례 ── */
        .legend {
            position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
            z-index: 500;
            display: flex; align-items: center; gap: 1rem;
            background: rgba(13,27,42,0.9); border: 1px solid var(--border);
            border-radius: 20px; padding: 0.45rem 1.2rem;
            font-size: 0.7rem; color: var(--text-2);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .legend-item { display: flex; align-items: center; gap: 0.35rem; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

        /* ── 지도·결과패널 top 조정 (티커 36px 추가) ── */
        #map { top: 92px !important; }
        .result-panel { top: 92px !important; }

        /* ── 속보 티커 바 ── */
        .ticker-bar {
            position: fixed; top: 56px; left: 0; right: 0; z-index: 900;
            height: 36px; display: flex; align-items: center;
            background: rgba(10,15,30,0.98);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }
        .ticker-label {
            flex-shrink: 0; padding: 0 0.85rem;
            font-size: 0.68rem; font-weight: 800; color: var(--accent);
            letter-spacing: 0.06em; text-transform: uppercase;
            border-right: 1px solid var(--border);
            height: 100%; display: flex; align-items: center; white-space: nowrap;
            gap: 0.35rem;
        }
        .ticker-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); flex-shrink: 0;
            animation: tickerBlink 1s ease-in-out infinite;
        }
        @keyframes tickerBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        .ticker-track {
            flex: 1; overflow: hidden; height: 100%; position: relative;
        }
        .ticker-item {
            position: absolute; inset: 0; display: flex; align-items: center;
            padding: 0 1rem; font-size: 0.74rem; color: var(--text); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .ticker-item.enter {
            animation: tickerEnter 0.38s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .ticker-item.exit {
            animation: tickerExit 0.38s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .ticker-time { color: var(--text-2); margin-right: 0.45rem; font-size: 0.68rem; flex-shrink: 0; }
        @keyframes tickerEnter {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes tickerExit {
            0%   { opacity: 1; transform: translateY(0)   scale(1); }
            100% { opacity: 0; transform: translateY(-6px) scale(0.97); }
        }

        /* ── SMS 버튼 ── */
        .sms-btn {
            position: relative; padding: 0.32rem 0.75rem;
            border-radius: 20px; font-size: 0.76rem; font-weight: 600;
            border: 1px solid var(--border); background: transparent; color: var(--text-2);
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .sms-btn:hover { color: var(--text); border-color: var(--text-2); }
        .sms-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(239,68,68,0.08); }
        .sms-badge {
            min-width: 16px; height: 16px; border-radius: 8px;
            background: var(--accent); color: #fff;
            font-size: 0.6rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center; padding: 0 4px;
        }

        /* ── SMS 패널 탭 바 ── */
        .sms-tab-bar {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.6rem 0.75rem 0; border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sms-tab {
            padding: 0.32rem 0.8rem; border-radius: 20px; font-size: 0.74rem; font-weight: 700;
            border: 1px solid var(--border); background: transparent; color: var(--text-2);
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .sms-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .sms-tab:not(.active):hover { color: var(--text); border-color: var(--text-2); }
        .sms-tab-count {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
            font-size: 0.6rem; font-weight: 800; margin-left: 0.25rem;
            background: rgba(255,255,255,0.25); color: inherit;
        }
        .sms-tab:not(.active) .sms-tab-count { background: var(--border); }

        /* ── 재난사고 카드 ── */
        .incident-card {
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.85rem 0.95rem; margin-bottom: 0.6rem;
            cursor: pointer; transition: border-color 0.15s, background 0.15s;
            position: relative; overflow: hidden;
        }
        .incident-card:hover { border-color: var(--accent-2); background: #1a1208; }
        .incident-card-header {
            display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.4rem;
        }
        .incident-emoji { font-size: 1rem; flex-shrink: 0; }
        .incident-title { font-size: 0.8rem; font-weight: 700; flex: 1; }
        .incident-sev {
            font-size: 0.64rem; font-weight: 800; padding: 0.1rem 0.4rem; border-radius: 4px;
            flex-shrink: 0;
        }
        .incident-sev-3 { background: rgba(239,68,68,0.18); color: #ef4444; }
        .incident-sev-2 { background: rgba(249,115,22,0.18); color: #f97316; }
        .incident-sev-1 { background: rgba(234,179,8,0.18);  color: #eab308; }
        .incident-time { font-size: 0.66rem; color: var(--text-2); flex-shrink: 0; }
        .incident-addr {
            font-size: 0.7rem; color: var(--text-2); margin-bottom: 0.35rem;
        }
        .incident-detail { font-size: 0.73rem; color: var(--text); line-height: 1.6; margin-bottom: 0.55rem; }
        .incident-goto {
            width: 100%; padding: 0.38rem; border-radius: 6px; font-size: 0.72rem; font-weight: 600;
            border: 1px solid var(--border); background: transparent; color: var(--text-2);
            cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .incident-goto:hover { background: var(--surface); color: var(--text); }

        /* ── 사고 마커 (지도) ── */
        .incident-marker {
            border-radius: 50%; border: 3px solid rgba(255,255,255,0.45);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; animation: incidentPulse 2s ease-in-out infinite;
        }
        @keyframes incidentPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.5); }
            50%      { box-shadow: 0 0 0 8px rgba(249,115,22,0); }
        }

        /* ── SMS 수신함 패널 ── */
        .sms-panel {
            position: fixed; top: 92px; right: 0; bottom: 0; z-index: 601;
            width: 340px; background: rgba(10,15,30,0.98);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sms-panel.open { transform: translateX(0); }

        /* ── SMS 카드 ── */
        .sms-card {
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.85rem 0.95rem; margin-bottom: 0.6rem;
            position: relative; overflow: hidden;
        }
        .sms-card.unread::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--accent); border-radius: 2px 0 0 2px;
        }
        .sms-card-header {
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.45rem;
        }
        .sms-card-agency {
            font-size: 0.68rem; font-weight: 700; color: var(--accent);
            background: rgba(239,68,68,0.12); padding: 0.12rem 0.45rem; border-radius: 4px;
            flex-shrink: 0;
        }
        .sms-card-time { font-size: 0.66rem; color: var(--text-2); margin-left: auto; }
        .sms-card-body { font-size: 0.75rem; color: var(--text); line-height: 1.65; }

        /* ── 재난문자 자동 팝업 ── */
        .sms-popup-wrap {
            position: fixed; top: 92px; left: 50%; z-index: 1500;
            transform: translateX(-50%) translateY(1rem);
            width: 360px; max-width: calc(100vw - 2rem);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .sms-popup-wrap.show {
            pointer-events: auto;
            opacity: 1;
            animation: popupDrop 0.4s cubic-bezier(0.34,1.4,0.64,1);
        }
        @keyframes popupDrop {
            from { transform: translateX(-50%) translateY(-0.5rem); }
            to   { transform: translateX(-50%) translateY(1rem); }
        }
        .sms-popup {
            background: #110808;
            border: 1.5px solid var(--accent);
            border-radius: 14px; overflow: hidden;
            box-shadow: 0 8px 40px rgba(239,68,68,0.35), 0 0 0 1px rgba(239,68,68,0.1);
        }
        .sms-popup-head {
            background: var(--accent); padding: 0.55rem 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .sms-popup-head-title { font-size: 0.82rem; font-weight: 800; color: #fff; flex: 1; letter-spacing: 0.04em; }
        .sms-popup-head-close {
            background: rgba(255,255,255,0.22); border: none; color: #fff;
            width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
            font-size: 0.65rem; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .sms-popup-head-close:hover { background: rgba(255,255,255,0.38); }
        .sms-popup-meta {
            padding: 0.55rem 1rem 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sms-popup-agency { font-size: 0.7rem; font-weight: 700; color: var(--accent); }
        .sms-popup-time { font-size: 0.66rem; color: var(--text-2); }
        .sms-popup-text {
            padding: 0.55rem 1rem 0.85rem;
            font-size: 0.78rem; color: var(--text); line-height: 1.7;
        }
        .sms-popup-footer {
            padding: 0.55rem 1rem; border-top: 1px solid rgba(239,68,68,0.18);
            display: flex; gap: 0.5rem;
        }
        .sms-popup-dismiss {
            flex: 1; padding: 0.42rem; border-radius: 7px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-2); font-size: 0.74rem; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .sms-popup-dismiss:hover { background: var(--surface-2); color: var(--text); }
        .sms-popup-view {
            flex: 1; padding: 0.42rem; border-radius: 7px;
            border: none; background: var(--accent);
            color: #fff; font-size: 0.74rem; font-weight: 700;
            cursor: pointer; transition: background 0.15s;
        }
        .sms-popup-view:hover { background: #dc2626; }
        .sms-popup-progress { height: 3px; background: rgba(239,68,68,0.15); overflow: hidden; }
        .sms-popup-bar {
            height: 100%; background: var(--accent);
            animation: smsBar 5s linear forwards;
        }
        @keyframes smsBar { from { width: 100%; } to { width: 0%; } }
        .sms-popup-bar { animation-duration: 10s !important; }

        /* ── 재난 단계 경보 패널 ── */
        .alert-panel {
            position: fixed; bottom: 272px; left: 1.5rem; z-index: 500;
            width: 220px;
            background: rgba(13,27,42,0.95); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.85rem 1.1rem;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .alert-panel-title {
            font-size: 0.68rem; font-weight: 700; color: var(--text-2);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.65rem;
        }
        .alert-steps { display: flex; gap: 0.3rem; margin-bottom: 0.5rem; }
        .alert-step {
            flex: 1; height: 5px; border-radius: 3px;
            background: var(--border); transition: background 0.4s ease;
        }
        .alert-step.on { background: var(--al-color); }
        .alert-row { display: flex; align-items: baseline; gap: 0.5rem; }
        .alert-badge {
            font-size: 0.78rem; font-weight: 800; color: var(--al-color);
            transition: color 0.4s;
        }
        .alert-desc { font-size: 0.68rem; color: var(--text-2); }

        /* ── 피해현황 카운터 ── */
        .damage-panel {
            position: fixed; bottom: 104px; right: 1rem; z-index: 500;
            width: 174px;
            background: rgba(13,27,42,0.95); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.85rem 1rem;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .damage-panel-title {
            font-size: 0.68rem; font-weight: 700; color: var(--text-2);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem;
        }
        .damage-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.42rem;
        }
        .damage-row:last-child { margin-bottom: 0; }
        .damage-lbl { font-size: 0.69rem; color: var(--text-2); }
        .damage-val {
            font-size: 0.82rem; font-weight: 800; color: var(--text);
            font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
        }
        .damage-val.hi { color: var(--accent); }

        /* ── 대피 경로 라인 ── */
        .route-popup-inner { font-family: Inter,sans-serif; font-size: 0.8rem; }

    // ══ 시뮬레이션 로직 ════════════════════════════════════════
    function haversine(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLng / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function calcScore(shelter, distanceM, disasterCode) {
        const distScore  = 40 * Math.max(0, 1 - distanceM / 5000);
        const capScore   = shelter.capacity > 0
                           ? 25 * (1 - shelter.current / shelter.capacity) : 0;
        const suitScore  = shelter.suitable.includes(disasterCode) ? 20 : 5;
        const opScore    = shelter.operateYn ? 10 : 0;
        const floorBonus = ['COLD', 'CHEMICAL'].includes(disasterCode) && shelter.floorLvl >= 3 ? 5 : 0;
        return {
            total: distScore + capScore + suitScore + opScore + floorBonus,
            dist: distScore, cap: capScore, suit: suitScore, op: opScore, bonus: floorBonus
        };
    }

    function buildReason(shelter, distanceM, disasterCode) {
        const parts = [];
        parts.push(shelter.suitable.includes(disasterCode) ? '재난유형 적합' : '재난유형 부적합 (차선)');
        const fillRatio = shelter.current / shelter.capacity;
        if (fillRatio < 0.3) parts.push('수용 여유 충분');
        else if (fillRatio > 0.7) parts.push('수용 거의 찼음');
        if (distanceM < 1000) parts.push(`도보 약 ${Math.round(distanceM / 80)}분`);
        else parts.push(`약 ${(distanceM / 1000).toFixed(1)}km 거리`);
        if (['COLD', 'CHEMICAL'].includes(disasterCode) && shelter.floorLvl >= 3) parts.push('고층 대피 유리');
        if (!shelter.operateYn) parts.push('현재 미운영');
        return parts.join(' · ');
    }

    function runSimulation() {
        if (userLat === null) return null;
        const results = SHELTERS
            .filter(s => s.operateYn)
            .map(s => {
                const dist = haversine(userLat, userLng, s.lat, s.lng);
                const score = calcScore(s, dist, currentDisaster);
                const reason = buildReason(s, dist, currentDisaster);
                return { shelter: s, distanceM: dist, score, reason };
            })
            .filter(r => r.distanceM <= 5000)
            .sort((a, b) => b.score.total - a.score.total)
            .slice(0, 3);
        return results;
    }

                    <div class="score-bar-fill" style="width:${pct}%"></div>
                </div>
                <div class="score-val">${val.toFixed(1)} / ${max}</div>
            </div>`;
    }

    let selectedResultCard = null;

    function selectResultCard(card, r, marker) {
        if (selectedResultCard) selectedResultCard.classList.remove('selected');
        selectedResultCard = card;
        card.classList.add('selected');
        const isMobile = window.innerWidth <= 640;
        const zoom = isMobile ? 14 : 15;
        // 모바일: bottom-sheet가 화면 62vh를 차지하므로 오프셋으로 위로 이동
        if (isMobile) {
            const offsetPx = window.innerHeight * 0.31; // 패널 절반 높이만큼 위로
            const targetPoint = map.project([r.shelter.lat, r.shelter.lng], zoom);
            targetPoint.y += offsetPx;
            const adjusted = map.unproject(targetPoint, zoom);
            map.flyTo(adjusted, zoom, { duration: 1.1 });
        } else {
            map.flyTo([r.shelter.lat, r.shelter.lng], zoom, { duration: 1.1 });
        }
        drawRoute(userLat, userLng, r.shelter);
        setTimeout(() => marker.openPopup(), 1200);
    }

    function openPanel(results) {
        recommendMarkers.forEach(m => map.removeLayer(m));
        recommendMarkers = [];
        selectedResultCard = null;

        const d = DISASTERS.find(x => x.code === currentDisaster);
        document.getElementById('panelSub').textContent =
            `📍 내 위치 기준 · ${d.icon} ${d.name}`;

        const body = document.getElementById('panelBody');
        body.innerHTML = '';

        const cards = [];
        const markers = [];

        results.forEach((r, i) => {
            const distKm = (r.distanceM / 1000).toFixed(1);
            const card = document.createElement('div');
            card.className = 'rec-card';
            card.innerHTML = `
                <div class="rec-card-header">
                    <div class="rec-rank">${i + 1}</div>
                    <div class="rec-name">${r.shelter.name}</div>
                    <div class="rec-score">${r.score.total.toFixed(1)}점</div>
                </div>
                <div class="score-rows">
                    ${scoreRow('거리', r.score.dist, 40)}
                    ${scoreRow('수용', r.score.cap, 25)}
                    ${scoreRow('적합', r.score.suit, 20)}
                    ${scoreRow('운영', r.score.op, 10)}
                    ${r.score.bonus > 0 ? scoreRow('보너스', r.score.bonus, 5) : ''}
                </div>
                <div class="rec-reason">${r.reason}</div>
                <button class="rec-goto">🗺️ ${distKm}km · 지도에서 보기</button>
            `;
            cards.push(card);

            const marker = L.marker([r.shelter.lat, r.shelter.lng], {
                icon: makeRecommendIcon(i + 1),
                zIndexOffset: 500
            });
            const fillPct = Math.round((r.shelter.current / r.shelter.capacity) * 100);
            marker.bindPopup(`
                <div style="font-family:Inter,sans-serif;font-size:0.8rem;min-width:170px">
                    <b style="color:#a855f7">#${i + 1} ${r.shelter.name}</b><br>
                    <span style="color:#94a3b8">종합점수</span> <b>${r.score.total.toFixed(1)}점</b><br>
                    <span style="color:#94a3b8">거리</span> ${distKm}km · 도보 ${Math.round(r.distanceM / 80)}분<br>
                    <span style="color:#94a3b8">수용</span> ${r.shelter.current}/${r.shelter.capacity}명 (${fillPct}%)
                </div>
            `, { className: 'dark-popup' });
            marker.addTo(map);
            markers.push(marker);
            recommendMarkers.push(marker);
        });

        results.forEach((r, i) => {
            const card = cards[i];
            const marker = markers[i];
            card.addEventListener('click', () => selectResultCard(card, r, marker));
            card.querySelector('.rec-goto').addEventListener('click', e => {
                e.stopPropagation();
                selectResultCard(card, r, marker);
            });
            body.appendChild(card);
        });

        const isMobile = window.innerWidth <= 640;

        if (results.length > 0) {
            drawRoute(userLat, userLng, results[0].shelter);
            cards[0].classList.add('selected');
            selectedResultCard = cards[0];

            const bounds = L.latLngBounds(
                results.map(r => [r.shelter.lat, r.shelter.lng])
            ).extend([userLat, userLng]);

            if (isMobile) {
                map.fitBounds(bounds, { padding: [60, 40] });
                showResultFab(results.length);
            } else {
                map.fitBounds(bounds, { padding: [60, 380] });
                document.getElementById('resultPanel').classList.add('open');
            }
        }
    }

    // ── 결과 FAB ────────────────────────────────────────────────
    function showResultFab(count) {
        const fab = document.getElementById('resultFab');
        document.getElementById('resultFabText').textContent = `결과 ${count}개 보기`;
        fab.style.display = 'flex';
        fab.classList.remove('pop');
        fab.offsetHeight;
        fab.classList.add('pop');
    }

    function hideResultFab() {
        document.getElementById('resultFab').style.display = 'none';
    }

    document.getElementById('resultFab').addEventListener('click', () => {
        document.getElementById('resultPanel').classList.add('open');
        hideResultFab();
    });

    // ────────────────────────────────────────────────────────────
    function closePanel() {
        const panel = document.getElementById('resultPanel');
        panel.classList.remove('open', 'peek');
        recommendMarkers.forEach(m => map.removeLayer(m));
        recommendMarkers = [];
        clearRoute();
        hideResultFab();
    }

    document.getElementById('panelClose').addEventListener('click', e => {
        e.stopPropagation();
        if (window.innerWidth <= 640) {
            document.getElementById('resultPanel').classList.remove('open');
            showResultFab(recommendMarkers.length);
        } else {
            closePanel();
        }
    });

    document.getElementById('runBtn').addEventListener('click', () => {
        const results = runSimulation();
        if (!results || results.length === 0) {
            alert('반경 5km 내에 운영 중인 대피소가 없습니다.\n다른 위치를 선택해 주세요.');
            return;
        }
        openPanel(results);
    });

    // ══ 속보 티커 (슬라이드업 방식) ═════════════════════════════
    let tickerIndex = 0;
    let tickerInterval = null;

    function showTickerItem(items, idx) {
        const track = document.getElementById('tickerTrack');
        const item = items[idx];

        const next = document.createElement('div');
        next.className = 'ticker-item enter';
        next.innerHTML = `<span class="ticker-time">[${item.time}]</span>${item.text}`;

        const prev = track.querySelector('.ticker-item');
        if (prev) {
            prev.classList.remove('enter');
            prev.classList.add('exit');
            setTimeout(() => prev.remove(), 380);
        }
        track.appendChild(next);
    }

    function startTicker(code) {
        clearInterval(tickerInterval);
        const items = ALERTS[code] || [];
        if (!items.length) return;
        tickerIndex = 0;
        showTickerItem(items, tickerIndex);
        tickerInterval = setInterval(() => {
            tickerIndex = (tickerIndex + 1) % items.length;
            showTickerItem(items, tickerIndex);
        }, 5000);
    }

    // ══ ① 재난 단계 경보 ══════════════════════════════════════════
    function renderAlertLevel(code) {
        const al = ALERT_LEVELS[code];
        const panel = document.getElementById('alertPanel');
        panel.style.setProperty('--al-color', al.color);
        document.getElementById('alertBadge').textContent = al.label;
        document.getElementById('alertDesc').textContent  = al.desc;
        document.querySelectorAll('.alert-step').forEach(el => {
            el.classList.toggle('on', Number(el.dataset.lv) <= al.level);
        });
    }

    // ══ ② 피해현황 카운터 (카운트업) ════════════════════════════
    const _countTimers = {};
    function countUp(id, target, suffix) {
        clearInterval(_countTimers[id]);
        const el = document.getElementById(id);
        let cur = 0;
        const duration = 1200;
        const steps = 48;
        const inc = target / steps;
        _countTimers[id] = setInterval(() => {
            cur = Math.min(cur + inc, target);
            el.textContent = Math.round(cur).toLocaleString() + (suffix || '');
            if (cur >= target) clearInterval(_countTimers[id]);
        }, duration / steps);
    }

    function renderDamageCounter(code) {
        const s = DAMAGE_STATS[code];
        countUp('dmgDisplaced', s.displaced, '명');
        countUp('dmgReports',   s.reports,   '건');
        countUp('dmgShelter',   s.shelter,   '%');
    }

    // ══ ③ 대피 경로 라인 ══════════════════════════════════════════
    let routeLayer = null;

    function clearRoute() {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    }

    function drawRoute(fromLat, fromLng, shelter) {
        clearRoute();
        const distM  = haversine(fromLat, fromLng, shelter.lat, shelter.lng);
        const walkMin = Math.round(distM / 80);
        routeLayer = L.layerGroup();

        const line = L.polyline(
            [[fromLat, fromLng], [shelter.lat, shelter.lng]],
            { color:'#a855f7', weight:3, dashArray:'10 7', opacity:0.9 }
        );
        line.bindPopup(
            `<div class="route-popup-inner">
                <b style="color:#a855f7">📍 → 🏠 대피 경로 (1순위)</b><br>
                도보 약 <b>${walkMin}분</b> · ${(distM/1000).toFixed(1)}km
             </div>`,
            { className:'dark-popup' }
        );
        routeLayer.addLayer(line);
        routeLayer.addTo(map);
    }

    // ══ 사고 마커 ════════════════════════════════════════════════
    let incidentMarkers = [];

    function clearIncidentMarkers() {
        incidentMarkers.forEach(m => map.removeLayer(m));
        incidentMarkers = [];
    }

    function makeIncidentIcon(inc) {
        const colors = { 3:'#ef4444', 2:'#f97316', 1:'#eab308' };
        const bg = colors[inc.severity] || '#f97316';
        return L.divIcon({
            className: '',
            html: `<div class="incident-marker" style="width:36px;height:36px;background:${bg};box-shadow:0 0 12px ${bg}99">${inc.icon}</div>`,
            iconSize: [36, 36], iconAnchor: [18, 18]
        });
    }

    function flyToIncident(inc) {
        clearIncidentMarkers();
        map.flyTo([inc.lat, inc.lng], 15, { duration: 1.2 });
        const marker = L.marker([inc.lat, inc.lng], { icon: makeIncidentIcon(inc), zIndexOffset: 900 });
        marker.bindPopup(`
            <div style="font-family:Inter,sans-serif;font-size:0.8rem;min-width:180px">
                <div style="font-size:0.88rem;font-weight:800;margin-bottom:0.3rem">${inc.icon} ${inc.title}</div>
                <div style="color:#94a3b8;font-size:0.7rem;margin-bottom:0.4rem">📍 ${inc.address} · ${inc.time}</div>
                <div style="line-height:1.6">${inc.detail}</div>
            </div>
        `, { className: 'dark-popup' });
        marker.addTo(map);
        incidentMarkers.push(marker);
        setTimeout(() => marker.openPopup(), 1300);
    }

    // ══ SMS 수신함 패널 ══════════════════════════════════════════
    let smsPanelOpen = false;
    let activeTab = 'sms';
    let unreadCount = 4;

    function updateSmsBadge(n) {
        unreadCount = n;
        const badge = document.getElementById('smsBadge');
        badge.textContent = n;
        badge.style.display = n > 0 ? 'flex' : 'none';
        const btn = document.getElementById('smsBtn');
        btn.classList.toggle('active', n > 0);
    }

    function renderSmsTab(code) {
        const msgs = MESSAGES[code] || [];
        const body = document.getElementById('smsPanelBody');
        body.innerHTML = '';
        msgs.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'sms-card' + (i < 2 ? ' unread' : '');
            card.innerHTML = `
                <div class="sms-card-header">
                    <span class="sms-card-agency">${m.agency}</span>
                    <span class="sms-card-time">${m.time}</span>
                </div>
                <div class="sms-card-body">${m.body}</div>`;
            card.addEventListener('click', () => card.classList.remove('unread'));
            body.appendChild(card);
        });
        document.getElementById('tabSmsCount').textContent = msgs.length;
    }

    function renderIncidentTab(code) {
        const incs = INCIDENTS[code] || [];
        const body = document.getElementById('smsPanelBody');
        body.innerHTML = '';
        document.getElementById('tabIncidentCount').textContent = incs.length;
        incs.forEach(inc => {
            const card = document.createElement('div');
            card.className = 'incident-card';
            card.innerHTML = `
                <div class="incident-card-header">
                    <span class="incident-emoji">${inc.icon}</span>
                    <span class="incident-title">${inc.title}</span>
                    <span class="incident-sev incident-sev-${inc.severity}">${SEV_LABEL[inc.severity]}</span>
                    <span class="incident-time">${inc.time}</span>
                </div>
                <div class="incident-addr">📍 ${inc.address}</div>
                <div class="incident-detail">${inc.detail}</div>
                <button class="incident-goto">🗺️ 지도에서 보기</button>`;
            card.querySelector('.incident-goto').addEventListener('click', e => {
                e.stopPropagation();
                flyToIncident(inc);
            });
            card.addEventListener('click', () => flyToIncident(inc));
            body.appendChild(card);
        });
    }

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('tabSms').classList.toggle('active', tab === 'sms');
        document.getElementById('tabIncident').classList.toggle('active', tab === 'incident');
        if (tab === 'sms') renderSmsTab(currentDisaster);
        else renderIncidentTab(currentDisaster);
    }

    function renderSmsPanel(code) {
        if (activeTab === 'sms') renderSmsTab(code);
        else renderIncidentTab(code);
        const incs = INCIDENTS[code] || [];
        document.getElementById('tabIncidentCount').textContent = incs.length;
        const msgs = MESSAGES[code] || [];
        document.getElementById('tabSmsCount').textContent = msgs.length;
    }

    function openSmsPanel() {
        closePanel();
        clearIncidentMarkers();
        renderSmsPanel(currentDisaster);
        document.getElementById('smsPanel').classList.add('open');
        document.getElementById('smsBtn').classList.add('active');
        smsPanelOpen = true;
        updateSmsBadge(0);
    }

    function closeSmsPanel() {
        document.getElementById('smsPanel').classList.remove('open');
        document.getElementById('smsBtn').classList.remove('active');
        smsPanelOpen = false;
        clearIncidentMarkers();
    }

    document.getElementById('smsBtn').addEventListener('click', () => {
        smsPanelOpen ? closeSmsPanel() : openSmsPanel();
    });
    document.getElementById('smsPanelClose').addEventListener('click', closeSmsPanel);
    document.getElementById('tabSms').addEventListener('click', () => switchTab('sms'));
    document.getElementById('tabIncident').addEventListener('click', () => switchTab('incident'));

    // ══ 재난문자 자동 팝업 ════════════════════════════════════════
    let popupTimer = null;

    function showSmsPopup(code) {
        const msgs = MESSAGES[code] || [];
        if (!msgs.length) return;
        const m = msgs[0]; // 가장 최신 문자
        document.getElementById('smsPopupAgency').textContent = m.agency;
        document.getElementById('smsPopupTime').textContent = m.time;
        document.getElementById('smsPopupText').textContent = m.body;

        // 진행바 리셋
        const bar = document.getElementById('smsPopupBar');
        bar.style.animation = 'none';
        bar.offsetHeight;
        bar.style.animation = 'smsBar 10s linear forwards';

        const wrap = document.getElementById('smsPopupWrap');
        wrap.classList.add('show');

        clearTimeout(popupTimer);
        popupTimer = setTimeout(hideSmsPopup, 10000);
    }

    function hideSmsPopup() {
        clearTimeout(popupTimer);
        const wrap = document.getElementById('smsPopupWrap');
        wrap.style.opacity = '0';
        wrap.style.pointerEvents = 'none';
        setTimeout(() => {
            wrap.classList.remove('show');
            wrap.style.opacity = '';
            wrap.style.pointerEvents = '';
        }, 260);
    }

    document.getElementById('smsPopupClose').addEventListener('click', hideSmsPopup);
    document.getElementById('smsPopupDismiss').addEventListener('click', hideSmsPopup);
    document.getElementById('smsPopupViewBtn').addEventListener('click', () => {
        hideSmsPopup();
        openSmsPanel();
    });

    // ══ 초기 렌더링 ═══════════════════════════════════════════
    renderTabs();
    renderZones();
    renderShelterMarkers();
    startTicker(currentDisaster);
    updateSmsBadge(4);
    renderAlertLevel(currentDisaster);
    renderDamageCounter(currentDisaster);
    setTimeout(() => showSmsPopup(currentDisaster), 1200);
    </script>
</body>
</html>
