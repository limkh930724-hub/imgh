<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임광호 — Java Backend Developer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍💻</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── Design Tokens ── */
        :root {
            --bg:       #ffffff;
            --bg-2:     #f4f4f5;
            --text:     #111827;
            --text-2:   #6b7280;
            --accent:   #16a34a;
            --accent-2: rgba(22,163,74,0.12);
            --border:   #e5e7eb;
            --card-bg:  #f9fafb;
            --shadow:   0 4px 24px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg:       #0f1117;
            --bg-2:     #1a1d27;
            --text:     #f1f5f9;
            --text-2:   #94a3b8;
            --accent:   #4ade80;
            --accent-2: rgba(74,222,128,0.12);
            --border:   #2d3148;
            --card-bg:  #1a1d27;
            --shadow:   0 4px 24px rgba(0,0,0,0.3);
        }

        /* ── Base ── */
        html {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        /* ── Scroll Sections ── */
        .section {
            scroll-snap-align: start;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
        }
        .section--career {
            align-items: flex-start;
            padding-top: 5rem;
            padding-bottom: 5rem;
        }
        .section__inner {
            width: 100%;
            max-width: 900px;
        }

        /* ── Fixed Theme Toggle ── */
        .theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            z-index: 1000;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        .theme-toggle:hover { background: var(--bg-2); }

        /* ── Side Dot Nav ── */
        .dot-nav {
            position: fixed;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dot-nav__dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border);
            border: none;
            cursor: pointer;
            padding: 0;
            transition: background 0.2s, transform 0.2s;
        }
        .dot-nav__dot.active {
            background: var(--accent);
            transform: scale(1.35);
        }

        /* ── Section Label ── */
        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .dot-nav { display: none; }
            .section { padding: 3rem 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeBtn" title="테마 전환">🌙</button>

    <!-- Side Dot Nav -->
    <nav class="dot-nav" id="dotNav" aria-label="섹션 네비게이션">
        <button class="dot-nav__dot active" data-target="hero" title="Hero"></button>
        <button class="dot-nav__dot" data-target="about" title="About"></button>
        <button class="dot-nav__dot" data-target="career" title="Career"></button>
        <button class="dot-nav__dot" data-target="skills" title="Skills"></button>
        <button class="dot-nav__dot" data-target="projects" title="Projects"></button>
        <button class="dot-nav__dot" data-target="contact" title="Contact"></button>
    </nav>

    <!-- 1. Hero -->

    <!-- 6. Contact -->

            <!-- Task 7 -->

    </section>

    <script>

</html>
